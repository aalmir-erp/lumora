plugins {
    id 'com.android.application'
}

android {
    namespace 'ae.servia.wear'
    compileSdk 34
    defaultConfig {
        applicationId "ae.servia.wear"
        minSdk 26          // Wear OS 2.0 baseline
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
    // signingConfigs are required for -P injected signing to work. Values
    // come from environment via gradle.properties at build time. Without
    // declaring this here, AGP produces unsigned APKs and our find for
    // app-release-signed.apk fails.
    signingConfigs {
        release {
            // These are placeholders — actual values supplied via gradle
            // -Pandroid.injected.signing.* properties at build time.
            storeFile file("../../../servia.jks")
            storePassword "placeholder"
            keyAlias "servia"
            keyPassword "placeholder"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.wear:wear:1.3.0'
    // Optional but useful: BoxInsetLayout helps avoid the round-screen edges.
    implementation 'com.google.android.support:wearable:2.9.0'
    compileOnly 'com.google.android.wearable:wearable:2.9.0'
}
