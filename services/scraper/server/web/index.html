<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lumora Scraper</title>
<style>
  :root { --bg:#0b0d10; --card:#14181d; --border:#222; --text:#e8eaed; --muted:#7a828c; --accent:#4f8cff; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  header h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.5px; }
  header .pill { font-size:11px; padding:3px 8px; border:1px solid var(--border); border-radius:99px; color:var(--muted); }
  main { display:grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 50px); }
  aside { padding:16px; border-right:1px solid var(--border); }
  section { padding:16px; overflow:auto; }
  label { display:block; font-size:11px; color:var(--muted); margin:10px 0 4px; text-transform:uppercase; letter-spacing:.5px; }
  select, textarea, input { width:100%; background:#0f1216; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-family:inherit; font-size:13px; }
  textarea { min-height:90px; resize:vertical; }
  button { background:var(--accent); color:white; border:none; padding:9px 14px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:13px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
  .card h3 { margin:0 0 6px; font-size:13px; }
  .muted { color:var(--muted); font-size:12px; }
  .events { font-size:12px; line-height:1.5; }
  .event { padding:6px 0; border-bottom:1px solid #1a1d22; }
  .event .kind { display:inline-block; min-width:90px; color:var(--accent); }
  .event.error .kind { color:#ff6b6b; }
  .event.done .kind { color:#3ddc97; }
  .shots { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-top:12px; }
  .shot { background:#000; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .shot img { width:100%; display:block; }
  .shot .cap { padding:5px 8px; font-size:11px; color:var(--muted); border-top:1px solid var(--border); }
  .answer { background:#0f1a14; border:1px solid #1f4a35; padding:12px; border-radius:6px; margin-top:10px; white-space:pre-wrap; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>LUMORA SCRAPER</h1>
  <span class="pill" id="agentsPill">agents: -</span>
  <span class="pill" id="runtimePill">runtime: -</span>
</header>
<main>
<aside>
  <label>Goal / task</label>
  <textarea id="goal" placeholder="Visit https://sale.mir.ae/demo and ..."></textarea>

  <div class="row">
    <div>
      <label>AI backend</label>
      <select id="backend"></select>
    </div>
    <div>
      <label>Runtime</label>
      <select id="runtime"></select>
    </div>
  </div>
  <div class="row">
    <div>
      <label>Mode</label>
      <select id="mode">
        <option>browser</option>
        <option>desktop</option>
      </select>
    </div>
    <div>
      <label>Agent (local)</label>
      <select id="agent_id"><option value="">auto</option></select>
    </div>
  </div>
  <label>Max steps</label>
  <input id="max_steps" type="number" value="25" min="1" max="100" />

  <div style="margin-top:14px;">
    <button id="runBtn">Run task</button>
  </div>

  <div class="muted" style="margin-top:14px;">
    Force-local hosts: <span id="forceLocal"></span>
  </div>
</aside>

<section>
  <div class="card">
    <h3 id="taskTitle">No task running</h3>
    <div class="muted" id="taskMeta"></div>
    <div id="answer"></div>
  </div>
  <div class="events" id="events"></div>
  <div class="shots" id="shots"></div>
</section>
</main>

<script>
let currentTaskId = null;
let evtSrc = null;

async function loadConfig() {
  const r = await fetch("/api/config"); const c = await r.json();
  const back = document.getElementById("backend"); back.innerHTML = "";
  c.backends.forEach(b => { const o = document.createElement("option"); o.value=b; o.textContent=b; if (b===c.default_backend) o.selected=true; back.appendChild(o); });
  const rt = document.getElementById("runtime"); rt.innerHTML = "";
  c.runtimes.forEach(b => { const o = document.createElement("option"); o.value=b; o.textContent=b; if (b===c.default_runtime) o.selected=true; rt.appendChild(o); });
  const ag = document.getElementById("agent_id");
  c.agents_connected.forEach(a => { const o = document.createElement("option"); o.value=a; o.textContent=a; ag.appendChild(o); });
  document.getElementById("agentsPill").textContent = "agents: " + (c.agents_connected.length || "0");
  document.getElementById("forceLocal").textContent = (c.force_local_hosts||[]).join(", ");
}

async function runTask() {
  const body = {
    goal: document.getElementById("goal").value.trim(),
    backend: document.getElementById("backend").value,
    runtime: document.getElementById("runtime").value,
    mode: document.getElementById("mode").value,
    agent_id: document.getElementById("agent_id").value || null,
    max_steps: parseInt(document.getElementById("max_steps").value) || 25,
  };
  if (!body.goal) { alert("Enter a goal"); return; }
  document.getElementById("runBtn").disabled = true;
  document.getElementById("events").innerHTML = "";
  document.getElementById("shots").innerHTML = "";
  document.getElementById("answer").innerHTML = "";
  const r = await fetch("/api/tasks", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(body) });
  const data = await r.json();
  currentTaskId = data.id;
  document.getElementById("taskTitle").textContent = "Task " + data.id;
  document.getElementById("taskMeta").textContent = `${body.backend} / ${body.runtime} / ${body.mode}`;
  if (evtSrc) evtSrc.close();
  evtSrc = new EventSource(`/api/tasks/${data.id}/events`);
  evtSrc.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    renderEvent(ev);
  };
  evtSrc.onerror = () => { document.getElementById("runBtn").disabled = false; };
}

function renderEvent(ev) {
  const evDiv = document.getElementById("events");
  const row = document.createElement("div");
  row.className = "event " + ev.kind;
  let detail = "";
  if (ev.kind === "step") detail = `${ev.data.action} ${JSON.stringify(ev.data.args || {}).slice(0,120)}`;
  else if (ev.kind === "error") detail = ev.data.message;
  else if (ev.kind === "done") {
    detail = ev.data.reasoning || "";
    if (ev.data.answer != null) {
      const ans = document.getElementById("answer");
      ans.innerHTML = `<div class="answer">${typeof ev.data.answer === "string" ? ev.data.answer : JSON.stringify(ev.data.answer, null, 2)}</div>`;
    }
    document.getElementById("runBtn").disabled = false;
  }
  else if (ev.kind === "screenshot") {
    fetchShot(currentTaskId, ev.data.step);
    detail = `step ${ev.data.step} ${ev.data.url||""}`;
  }
  else if (ev.kind === "start") detail = `${ev.data.backend} / ${ev.data.runtime} / ${ev.data.mode}`;
  row.innerHTML = `<span class="kind">${ev.kind}</span> ${detail}`;
  evDiv.appendChild(row);
  evDiv.scrollTop = evDiv.scrollHeight;
}

async function fetchShot(tid, step) {
  const r = await fetch(`/api/tasks/${tid}/screenshot/${step}`);
  if (!r.ok) return;
  const j = await r.json();
  if (!j.b64) return;
  const div = document.createElement("div");
  div.className = "shot";
  div.innerHTML = `<img src="data:image/png;base64,${j.b64}"><div class="cap">step ${step}: ${j.url||""}</div>`;
  document.getElementById("shots").prepend(div);
}

document.getElementById("runBtn").addEventListener("click", runTask);
loadConfig();
setInterval(loadConfig, 8000);
</script>
</body>
</html>
