name: PageSpeed Insights
on:
  push: { branches: [main] }
  workflow_dispatch: {}
  schedule: [{ cron: "0 2 * * *" }]

permissions: { contents: write }
concurrency: { group: pagespeed, cancel-in-progress: true }

env:
  TARGET: https://lumora-production-4071.up.railway.app

jobs:
  pagespeed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Wait 60s for deploy to settle
        run: sleep 60

      - name: Probe target health
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/api/health" || echo 0)
            echo "probe $i → $code"
            [ "$code" = "200" ] && break
            sleep 10
          done

      - name: Run PSI via Google API
        run: |
          set +e
          mkdir -p psi
          declare -A urls=( ["home"]="/" ["faq"]="/faq.html" ["service"]="/service.html?id=deep_cleaning" )
          for name in "${!urls[@]}"; do
            url="$TARGET${urls[$name]}"
            for strat in mobile desktop; do
              encoded=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$url")
              echo "PSI $name [$strat] → $url"
              curl -fsS --max-time 120 \
                "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encoded}&strategy=${strat}&category=performance&category=accessibility&category=best-practices&category=seo" \
                -o "psi/${name}-${strat}.json" || echo "[psi] failed: $name/$strat"
              sleep 5
            done
          done
          ls -la psi/

      - name: Summarise
        id: scores
        run: |
          python3 <<'PY'
          import json, glob, os, datetime
          rows, best, worst = [], {"perf":0,"a11y":0,"best":0,"seo":0}, {"perf":100,"a11y":100,"best":100,"seo":100}
          files = sorted(glob.glob("psi/*.json"))
          if not files:
              with open("LIGHTHOUSE.md","w") as f:
                  f.write("# PSI run\n\nNo PSI data — API quota exceeded or target unreachable.\n")
              print("no files"); raise SystemExit(0)
          for f in files:
              try: d = json.load(open(f))
              except Exception as e: rows.append(f"  {f}: parse error ({e})"); continue
              c = d.get("lighthouseResult",{}).get("categories",{})
              row = {k: int((c.get(c_key,{}).get("score") or 0)*100) for k,c_key in
                     [("perf","performance"),("a11y","accessibility"),("best","best-practices"),("seo","seo")]}
              tag = os.path.basename(f).replace(".json","")
              rows.append(f"  {tag:24s}  perf={row['perf']:3d}  a11y={row['a11y']:3d}  bp={row['best']:3d}  seo={row['seo']:3d}")
              for k in best: best[k]=max(best[k],row[k]); worst[k]=min(worst[k],row[k])
          when = datetime.datetime.utcnow().isoformat(timespec="minutes")+"Z"
          summary = f"PSI {when}\n\n" + "\n".join(rows)
          summary += f"\n\nBest:  perf={best['perf']} a11y={best['a11y']} bp={best['best']} seo={best['seo']}"
          summary += f"\nWorst: perf={worst['perf']} a11y={worst['a11y']} bp={worst['best']} seo={worst['seo']}"
          print(summary)
          with open("LIGHTHOUSE.md","w") as f:
              f.write("# PageSpeed Insights\n\n```\n"+summary+"\n```\n")
          gh = os.environ.get("GITHUB_OUTPUT")
          if gh:
              with open(gh,"a") as f: f.write(f"perf={best['perf']}\nworst_perf={worst['perf']}\n")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-json
          path: psi/
          retention-days: 30

      - name: Commit results
        if: always()
        run: |
          git config user.email "psi-bot@lumora.local"
          git config user.name "psi-bot"
          git add LIGHTHOUSE.md || true
          git diff --cached --quiet || git commit -m "psi: perf=${{ steps.scores.outputs.perf }} (worst=${{ steps.scores.outputs.worst_perf }})"
          git push origin HEAD:main || true
