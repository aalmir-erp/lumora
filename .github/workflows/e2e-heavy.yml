name: E2E heavy (Playwright) — UI/SEO/auth/NFC

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  schedule:
    - cron: '37 */12 * * *'

permissions:
  contents: write

concurrency:
  group: e2e-heavy
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + browser
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Run heavy Playwright sweep
        env:
          SERVIA_BASE: https://servia.ae
          E2E_SHOT_DIR: /tmp/e2e-shots
        run: |
          mkdir -p /tmp/e2e-shots
          node tests/e2e-heavy.mjs 2>&1 | tee /tmp/e2e-heavy.log
          grep "FINDINGS-JSON:" /tmp/e2e-heavy.log | tail -1 | sed 's/^FINDINGS-JSON://' > /tmp/findings.json || true
          python3 .scripts/format-e2e-results.py || true

      # v1.24.85 — commit small (240px) thumbnails into the repo so admin
      # can view them at /admin/e2e-shots without GitHub login. Full PNGs
      # remain in workflow artifact (7-day retention).
      - name: Build thumbnails for admin viewer
        if: always()
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends imagemagick 2>&1 | tail -2 || true
          OUT="_e2e-shots/${{ github.run_number }}-${{ github.run_id }}"
          mkdir -p "$OUT"
          for f in /tmp/e2e-shots/*.png; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            convert "$f" -resize 240x -strip -quality 78 "$OUT/$base" 2>/dev/null || cp "$f" "$OUT/$base"
          done
          python3 .scripts/e2e-shots-manifest.py "$OUT" || true

      # Keep only the 14 most recent runs in _e2e-shots/ (auto-prune).
      - name: Prune old screenshot folders
        if: always()
        run: |
          if [ -d _e2e-shots ]; then
            cd _e2e-shots
            ls -1 | sort -n | head -n -14 | while read d; do
              [ -d "$d" ] && rm -rf "$d" && echo "pruned: $d"
            done
          fi
          true

      - name: Commit results to repo
        if: always()
        continue-on-error: true
        run: |
          set -x
          git config user.email "e2e-heavy@github-actions"
          git config user.name "E2E Heavy bot"
          # Tag pushes start in detached-HEAD state. Switch to (or create)
          # local main so the push has somewhere to push.
          git fetch origin main
          git checkout -B main origin/main
          ls -la _e2e-shots/ 2>/dev/null || echo "(no _e2e-shots dir)"
          # Re-run the build/prune steps because we're on a different ref now
          OUT="_e2e-shots/${{ github.run_number }}-${{ github.run_id }}"
          mkdir -p "$OUT"
          for f in /tmp/e2e-shots/*.png; do
            [ -e "$f" ] || continue
            cp "$f" "$OUT/$(basename "$f")"
          done
          # Make thumbs (idempotent — convert in place)
          for f in "$OUT"/*.png; do
            [ -e "$f" ] || continue
            convert "$f" -resize 240x -strip -quality 78 "$f" 2>/dev/null || true
          done
          python3 .scripts/e2e-shots-manifest.py "$OUT" || true
          # Prune
          (cd _e2e-shots && ls -1 2>/dev/null | sort -n | head -n -14 | while read d; do
              [ -d "$d" ] && rm -rf "$d" && echo "pruned: $d"
          done) || true
          # Commit + push
          git add -A TEST_RESULTS_HEAVY.md _e2e-shots/ 2>/dev/null || true
          git status --short | head -20
          if ! git diff --staged --quiet; then
            git commit -m "e2e-heavy run #${{ github.run_number }}: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main || echo "push failed (will retry next run)"
          else
            echo "no changes to commit"
          fi

      - name: Upload screenshots + log (7-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-heavy-results
          path: |
            TEST_RESULTS_HEAVY.md
            /tmp/findings.json
            /tmp/e2e-heavy.log
            /tmp/e2e-shots/
          if-no-files-found: warn
          retention-days: 7
