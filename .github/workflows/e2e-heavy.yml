name: E2E heavy (Playwright) — UI/SEO/auth/NFC

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  schedule:
    - cron: '37 */12 * * *'

permissions:
  contents: write

concurrency:
  group: e2e-heavy
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + browser
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Run heavy Playwright sweep
        env:
          SERVIA_BASE: https://servia.ae
          E2E_SHOT_DIR: /tmp/e2e-shots
        run: |
          mkdir -p /tmp/e2e-shots
          node tests/e2e-heavy.mjs 2>&1 | tee /tmp/e2e-heavy.log
          grep "FINDINGS-JSON:" /tmp/e2e-heavy.log | tail -1 | sed 's/^FINDINGS-JSON://' > /tmp/findings.json || true
          python3 .scripts/format-e2e-results.py || true

      - name: Commit results to repo
        if: always()
        continue-on-error: true
        run: |
          git config user.email "e2e-heavy@github-actions"
          git config user.name "E2E Heavy bot"
          if [ -f TEST_RESULTS_HEAVY.md ]; then
            git add TEST_RESULTS_HEAVY.md
            git diff --staged --quiet || git commit -m "e2e-heavy: $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "push failed"
          fi

      - name: Upload screenshots + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-heavy-results
          path: |
            TEST_RESULTS_HEAVY.md
            /tmp/findings.json
            /tmp/e2e-heavy.log
            /tmp/e2e-shots/
          if-no-files-found: warn
          retention-days: 14
