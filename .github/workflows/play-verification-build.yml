name: "Play Store · 02 Build verification APK"

# v1.24.153 — Reads keystore + password from committed repo files
# (_release/upload-keystore.b64 + _release/keystore-password.txt)
# generated by the sandbox in v1.24.153. No GitHub Secrets required —
# the founder is phone-only and setting secrets on mobile is awkward.
#
# Builds a minimal Android APK with:
#   - applicationId = ae.servia.app  (matches the package being verified)
#   - assets/adi-registration.properties containing the Play Console snippet
#   - Signed with the upload keystore committed to the repo
# Output: servia-verification-apk artifact (a single .apk file you upload
#         to Play Console → Android Developer Verification → Upload APK).

on:
  workflow_dispatch:
    inputs:
      verification_snippet:
        description: "Paste the snippet from Play Console (e.g. C0B2JHE7AEDB0AAAAAAAAAAAAAA)"
        required: true
      package_name:
        description: "Package name (default: ae.servia.app — keep this)"
        default: "ae.servia.app"
        required: true
  # v1.24.153 — Also trigger automatically when the founder commits a snippet
  # to _release/verification-snippet.txt. This lets the agent push a snippet
  # on the founder's behalf and have CI build the APK without phone interaction.
  push:
    paths:
      - "_release/verification-snippet.txt"
      - "_release/upload-keystore.b64"
      - "_release/keystore-password.txt"
      - ".github/workflows/play-verification-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sanity-check committed keystore exists
        run: |
          if [ ! -f "_release/upload-keystore.b64" ]; then
            echo "::error::_release/upload-keystore.b64 not found. Run workflow 01 first."
            exit 1
          fi
          if [ ! -f "_release/keystore-password.txt" ]; then
            echo "::error::_release/keystore-password.txt not found. Run workflow 01 first."
            exit 1
          fi
          echo "Keystore + password found in _release/ — ready to sign."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Decode keystore + load password
        id: keystore
        run: |
          base64 -d _release/upload-keystore.b64 > upload-keystore.jks
          ls -la upload-keystore.jks
          PASSWORD=$(cat _release/keystore-password.txt | tr -d '\n')
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Resolve verification snippet (input OR file)
        id: snippet
        run: |
          if [ -n "${{ github.event.inputs.verification_snippet }}" ]; then
            SNIPPET="${{ github.event.inputs.verification_snippet }}"
          elif [ -f "_release/verification-snippet.txt" ]; then
            SNIPPET=$(cat _release/verification-snippet.txt | head -1 | tr -d '\r\n')
          else
            echo "::error::No verification_snippet input AND no _release/verification-snippet.txt file."
            exit 1
          fi
          PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$PKG" ]; then PKG="ae.servia.app"; fi
          echo "snippet=$SNIPPET" >> "$GITHUB_OUTPUT"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "Using snippet: ${SNIPPET:0:8}... · package: $PKG"

      - name: Scaffold minimal Android project
        env:
          PKG: ${{ steps.snippet.outputs.package }}
          SNIPPET: ${{ steps.snippet.outputs.snippet }}
        run: |
          mkdir -p verify-app/app/src/main/{assets,res/values}
          mkdir -p verify-app/app/src/main/java/ae/servia/verify

          cat > verify-app/app/src/main/AndroidManifest.xml <<MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:allowBackup="false"
                  android:icon="@android:drawable/sym_def_app_icon">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          cat > verify-app/app/src/main/res/values/strings.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Servia Verification</string>
          </resources>
          XML

          cat > verify-app/app/src/main/java/ae/servia/verify/MainActivity.java <<JAVA
          package ae.servia.verify;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA

          # adi-registration.properties — THE VERIFICATION SNIPPET
          echo "$SNIPPET" > verify-app/app/src/main/assets/adi-registration.properties

          # App-level build.gradle
          cat > verify-app/app/build.gradle <<GRADLE
          apply plugin: 'com.android.application'
          android {
              namespace 'ae.servia.verify'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '0.0.1-verify'
              }
              signingConfigs {
                  release {
                      storeFile file('../../upload-keystore.jks')
                      storePassword System.getenv('KS_PASSWORD')
                      keyAlias 'servia'
                      keyPassword System.getenv('KS_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          GRADLE

          cat > verify-app/build.gradle <<GRADLE
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.4.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          cat > verify-app/settings.gradle <<GRADLE
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'servia-verify'
          include ':app'
          GRADLE

          cat > verify-app/gradle.properties <<PROPS
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          echo "Snippet committed to assets:"
          cat verify-app/app/src/main/assets/adi-registration.properties

      - name: Build signed release APK
        id: build_apk
        working-directory: verify-app
        env:
          KS_PASSWORD: ${{ steps.keystore.outputs.password }}
        run: |
          set +e
          gradle wrapper --gradle-version 8.5 2>&1 | tee gradle-wrapper.log
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --info 2>&1 | tee gradle-build.log
          RC=${PIPESTATUS[0]}
          echo "gradle exit code: $RC"
          exit $RC

      # v1.24.194d — Surface the gradle output to the run's Job Summary on failure.
      # The summary is rendered into the publicly-readable workflow page,
      # so the agent can diagnose CI failures without GitHub login.
      - name: Dump build logs to job summary (on failure)
        if: ${{ failure() && steps.build_apk.conclusion == 'failure' }}
        working-directory: verify-app
        run: |
          {
            echo "## Gradle build failed"
            echo ""
            echo '### Tail of gradle-build.log (last 200 lines)'
            echo '```'
            tail -200 gradle-build.log 2>/dev/null || echo "(no gradle-build.log)"
            echo '```'
            echo ""
            echo '### Tail of gradle-wrapper.log'
            echo '```'
            tail -80 gradle-wrapper.log 2>/dev/null || echo "(no gradle-wrapper.log)"
            echo '```'
            echo ""
            echo '### Generated build.gradle (app)'
            echo '```groovy'
            cat app/build.gradle 2>/dev/null || echo "(missing app/build.gradle)"
            echo '```'
            echo ""
            echo '### Generated build.gradle (root)'
            echo '```groovy'
            cat build.gradle 2>/dev/null || echo "(missing root build.gradle)"
            echo '```'
            echo ""
            echo '### Generated settings.gradle'
            echo '```groovy'
            cat settings.gradle 2>/dev/null || echo "(missing settings.gradle)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find verify-app/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::APK build failed — no .apk file found"
            exit 1
          fi
          NEW_NAME="servia-verification-${{ steps.snippet.outputs.package }}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "apk_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ APK BUILT: $NEW_NAME ($(stat -c%s "$NEW_NAME") bytes)"

      - name: Verify APK signing
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs --verbose \
            "${{ steps.apk.outputs.apk_name }}" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: servia-verification-apk
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 30
          if-no-files-found: error

      - name: Final instructions
        run: |
          echo ""
          echo "==================================================================="
          echo "✅ DONE — DOWNLOAD + UPLOAD"
          echo "==================================================================="
          echo "1. Scroll down to 'Artifacts' section on this workflow run page"
          echo "2. Download 'servia-verification-apk' (ZIP)"
          echo "3. Extract the .apk file"
          echo "4. Play Console → Android Developer Verification →"
          echo "   Servia Mobile App → Upload APK → drop the .apk"
          echo "==================================================================="
