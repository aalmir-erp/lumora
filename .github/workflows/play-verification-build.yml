name: "Play Store · 02 Build verification APK"

# v1.24.151 — Builds a minimal Android APK with:
#   - applicationId = ae.servia.app  (matches the package being verified)
#   - assets/adi-registration.properties containing the Play Console snippet
#   - Signed with the upload keystore from GitHub Secrets
# Output: servia-verification-apk artifact (a single .apk file you upload
#         to Play Console → Android Developer Verification → Upload APK).

on:
  workflow_dispatch:
    inputs:
      verification_snippet:
        description: "Paste the snippet from Play Console (e.g. C0B2JHE7AEDB0AAAAAAAAAAAAAA)"
        required: true
      package_name:
        description: "Package name (default: ae.servia.app — keep this)"
        default: "ae.servia.app"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sanity-check secrets are configured
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is not set."
            echo "Run workflow '01 Generate keystore' first, then set the 3 secrets."
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "::error::ANDROID_KEY_ALIAS secret is not set."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > upload-keystore.jks
          ls -la upload-keystore.jks
          echo "Restored keystore: $(stat -c%s upload-keystore.jks) bytes"

      - name: Scaffold minimal Android project
        env:
          PKG: ${{ github.event.inputs.package_name }}
          SNIPPET: ${{ github.event.inputs.verification_snippet }}
        run: |
          mkdir -p verify-app/app/src/main/{assets,res/values}
          mkdir -p verify-app/app/src/main/java/ae/servia/verify

          # AndroidManifest.xml — the package name comes from applicationId in build.gradle
          # but the namespace also drives R class generation
          cat > verify-app/app/src/main/AndroidManifest.xml <<MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:allowBackup="false"
                  android:icon="@android:drawable/sym_def_app_icon">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # strings.xml
          cat > verify-app/app/src/main/res/values/strings.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Servia Verification</string>
          </resources>
          XML

          # Minimal MainActivity (does nothing — verification APK doesn't need to function)
          cat > verify-app/app/src/main/java/ae/servia/verify/MainActivity.java <<JAVA
          package ae.servia.verify;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA

          # adi-registration.properties — THE VERIFICATION SNIPPET
          # Play Console requires this exact filename + this exact content
          echo "$SNIPPET" > verify-app/app/src/main/assets/adi-registration.properties

          # App-level build.gradle
          cat > verify-app/app/build.gradle <<GRADLE
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'ae.servia.verify'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '0.0.1-verify'
              }
              signingConfigs {
                  release {
                      storeFile file('../../upload-keystore.jks')
                      storePassword System.getenv('KS_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KS_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          GRADLE

          # Top-level build.gradle
          cat > verify-app/build.gradle <<GRADLE
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.4.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          # settings.gradle
          cat > verify-app/settings.gradle <<GRADLE
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'servia-verify'
          include ':app'
          GRADLE

          # gradle.properties
          cat > verify-app/gradle.properties <<PROPS
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # Verify the assets file made it
          cat verify-app/app/src/main/assets/adi-registration.properties

      - name: Build signed release APK
        working-directory: verify-app
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Bootstrap Gradle wrapper (no Wrapper installed in our scaffolded project)
          gradle wrapper --gradle-version 8.5
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find verify-app/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::APK build failed — no .apk file found"
            exit 1
          fi
          NEW_NAME="servia-verification-${{ github.event.inputs.package_name }}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "apk_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo ""
          echo "==================================================================="
          echo "✅ APK BUILT SUCCESSFULLY"
          echo "==================================================================="
          echo "File: $NEW_NAME"
          echo "Size: $(stat -c%s "$NEW_NAME") bytes"
          ls -la "$NEW_NAME"

      - name: Verify APK signing
        run: |
          # Use apksigner to confirm the signing
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs --verbose \
            "${{ steps.apk.outputs.apk_name }}" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: servia-verification-apk
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 30
          if-no-files-found: error

      - name: Final instructions
        run: |
          echo ""
          echo "==================================================================="
          echo "✅ DONE — DOWNLOAD + UPLOAD"
          echo "==================================================================="
          echo ""
          echo "1. Scroll to bottom of this workflow run page"
          echo "2. Tap 'servia-verification-apk' in the Artifacts section to download"
          echo "3. The download is a ZIP — extract the .apk file inside"
          echo "4. Open Play Console → Android Developer Verification →"
          echo "   Servia Mobile App → Upload APK → drop the .apk file"
          echo "5. Verification will complete in seconds"
          echo "6. Status moves from 'Draft' to 'Registered'"
          echo ""
          echo "After that, you can publish your actual app under ae.servia.app"
          echo "==================================================================="
