name: "Play Store · 01 Generate keystore (one-time)"

# v1.24.151 — Phone-friendly workflow for generating a fresh production
# keystore for ae.servia.app. Runs in the cloud — no laptop / no Java
# install required. Outputs:
#   1. upload-keystore.jks                 (the actual keystore — DOWNLOAD + BACK UP)
#   2. upload-keystore-base64.txt          (paste this content into a GitHub Secret)
#   3. NEXT-STEPS.txt                      (instructions for the founder)
#   + the SHA-256 fingerprint shown prominently in the workflow log
#
# Trigger via:  GitHub mobile app → Actions tab → this workflow → "Run workflow"
# Or via:       Repository → Actions tab → "Play Store · 01 Generate keystore" → Run workflow

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Keystore alias (default: servia-upload — keep this if unsure)"
        default: "servia-upload"
        required: true
      validity_years:
        description: "Validity in years (default: 30 — Play Store recommends 25+)"
        default: "30"
        required: true
      common_name:
        description: "Owner Common Name (default: Servia FZ-LLC)"
        default: "Servia FZ-LLC"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate strong random keystore password
        id: pwd
        run: |
          # 32-char password from /dev/urandom — base64url-safe, no special-char escaping issues
          STORE_PASSWORD=$(openssl rand -base64 24 | tr '/+=' 'X-_' | head -c 32)
          # Same password for key — simpler ops
          echo "::add-mask::$STORE_PASSWORD"
          echo "password=$STORE_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Generate keystore (RSA 2048, full validity period)
        env:
          PASSWORD: ${{ steps.pwd.outputs.password }}
          ALIAS: ${{ github.event.inputs.key_alias }}
          CN: ${{ github.event.inputs.common_name }}
        run: |
          DAYS=$(( ${{ github.event.inputs.validity_years }} * 365 ))
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $DAYS \
            -storetype JKS \
            -dname "CN=$CN, OU=Mobile Apps, O=$CN, L=Dubai, ST=Dubai, C=AE" \
            -storepass "$PASSWORD" \
            -keypass "$PASSWORD"

      - name: Extract SHA-256 fingerprint (paste this into Play Console)
        id: fp
        env:
          PASSWORD: ${{ steps.pwd.outputs.password }}
          ALIAS: ${{ github.event.inputs.key_alias }}
        run: |
          FP=$(keytool -list -v -keystore upload-keystore.jks -alias "$ALIAS" -storepass "$PASSWORD" \
                | grep -E "^\s*SHA256:" | head -1 | awk -F': ' '{print $2}' | tr -d '[:space:]')
          echo ""
          echo "==================================================================="
          echo "🔑 KEYSTORE GENERATED SUCCESSFULLY"
          echo "==================================================================="
          echo ""
          echo "📋 SHA-256 fingerprint (paste this into Play Console 'Change key'):"
          echo ""
          echo "    $FP"
          echo ""
          echo "📋 Keystore password (save this — you'll need it for every release):"
          echo ""
          echo "    ${{ steps.pwd.outputs.password }}"
          echo ""
          echo "📋 Key alias (also save):"
          echo ""
          echo "    ${{ github.event.inputs.key_alias }}"
          echo ""
          echo "==================================================================="
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"

      - name: Base64-encode keystore (paste this into GitHub Secret)
        run: |
          base64 -w 0 upload-keystore.jks > upload-keystore-base64.txt
          echo "Base64 keystore size: $(wc -c < upload-keystore-base64.txt) bytes"

      - name: Write NEXT-STEPS.txt
        env:
          FP: ${{ steps.fp.outputs.fingerprint }}
          PASSWORD: ${{ steps.pwd.outputs.password }}
          ALIAS: ${{ github.event.inputs.key_alias }}
        run: |
          cat > NEXT-STEPS.txt <<EOF
          ═══════════════════════════════════════════════════════════════
          NEXT STEPS — DO THESE IN ORDER
          ═══════════════════════════════════════════════════════════════

          1. BACK UP THE KEYSTORE — THIS IS YOUR APP'S LIFETIME IDENTITY
             Download upload-keystore.jks from this workflow's artifacts.
             Save it to AT LEAST THREE places:
               (a) Your phone's local storage
               (b) Your Google Drive / iCloud (encrypted folder ideal)
               (c) A USB drive or printout of the base64 file
             If you lose this file, you CANNOT update your app ever again.
             Google will not help recover it.

          2. STORE THE KEYSTORE AS A GITHUB SECRET
             GitHub mobile app or browser → this repo → Settings →
             Secrets and variables → Actions → New repository secret.
             Create THREE secrets:

               Name:  ANDROID_KEYSTORE_B64
               Value: (open upload-keystore-base64.txt and paste its
                       FULL content — one long line, no spaces)

               Name:  ANDROID_KEYSTORE_PASSWORD
               Value: $PASSWORD

               Name:  ANDROID_KEY_ALIAS
               Value: $ALIAS

          3. UPDATE PLAY CONSOLE
             Go back to Play Console → Android Developer Verification →
             Servia Mobile App → Change key.
             Paste this fingerprint:

               $FP

             Click Save. Play Console will then show a NEW verification
             snippet (something like C0B2JHE7AEDB0AAAAAAAAAAAAAA).
             COPY that new snippet.

          4. BUILD THE VERIFICATION APK
             Back in GitHub Actions tab → workflow "Play Store · 02 Build
             verification APK" → Run workflow → paste the new snippet
             into the "verification_snippet" input → Run.

          5. UPLOAD THE VERIFICATION APK
             Once that workflow completes (~3 min), download the
             servia-verification-apk artifact → it contains a .apk file.
             Upload that .apk to Play Console verification page.
             Verification will succeed and Servia Mobile App moves
             from "Draft" to "Registered". Then we move to actual
             app submission.
          EOF

      - name: Upload artifacts (auto-deleted after 7 days for security)
        uses: actions/upload-artifact@v4
        with:
          name: servia-keystore-CONFIDENTIAL-${{ github.run_id }}
          path: |
            upload-keystore.jks
            upload-keystore-base64.txt
            NEXT-STEPS.txt
          retention-days: 7
          if-no-files-found: error

      - name: Final reminder
        run: |
          echo ""
          echo "✅ Done. Download the artifact bundle from this workflow run."
          echo "   On phone: scroll to bottom of this page → 'Artifacts' section →"
          echo "   tap 'servia-keystore-CONFIDENTIAL-${{ github.run_id }}' to download."
          echo ""
          echo "⚠️  Artifact auto-deletes after 7 DAYS. Back up the .jks file BEFORE then."
