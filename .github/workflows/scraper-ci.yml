name: Scraper CI

on:
  push:
    paths:
      - 'services/scraper/**'
      - '.github/workflows/scraper-ci.yml'
  pull_request:
    paths:
      - 'services/scraper/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install server deps
        working-directory: services/scraper
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: services/scraper
        env:
          LOCAL_AGENT_TOKEN: ci-test-token
        run: python -m tests.run_all
