name: Build Android TWA (AAB + APK)
# Builds servia.ae as a Trusted Web Activity. Uses Bubblewrap to scaffold
# the Android Studio project, then runs gradle directly with keystore
# credentials passed as -P properties (Bubblewrap's own `build` command
# prompts for passwords interactively, which doesn't work in CI — that's
# why the previous run produced 0 artifacts despite "success").
#
# WHAT YOU GET:
#
# • No secrets configured → workflow auto-generates a one-off debug
#   keystore in CI and produces a sideload-able APK. NOT Play-Store
#   acceptable but installs on any phone with "Install unknown apps"
#   enabled.
#
# • Four ANDROID_* secrets set → production-signed AAB + APK ready for
#   Play Console upload.
#
# To switch to production signing, generate a keystore locally:
#   keytool -genkeypair -v -keystore servia.jks -keyalg RSA -keysize 2048 \
#           -validity 10000 -alias servia
#   base64 -w0 servia.jks > servia.jks.b64
# Then add at Repo → Settings → Secrets → Actions:
#   ANDROID_KEYSTORE_BASE64    contents of servia.jks.b64
#   ANDROID_KEY_ALIAS          servia
#   ANDROID_KEYSTORE_PASSWORD  <password>
#   ANDROID_KEY_PASSWORD       <password> (same as keystore for PKCS12)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which APK(s) to build"
        type: choice
        default: "auto"
        options: ["auto", "all", "phone", "wear", "faces", "single"]
  push:
    tags: ["v*"]
    branches: ["main"]
    paths:
      - "twa/android/wear/**"
      - "twa/android/wear-faceonly/**"
      - "twa/android/wear-singleface/**"
      - "twa/android/twa-manifest.json"
      - ".scripts/build-wear-apk.sh"
      - ".scripts/build-wear-faceonly-apk.sh"
      - ".scripts/build-wear-singleface-apk.sh"
      - ".github/workflows/build-android-twa.yml"

permissions:
  # `contents: write` lets actions/upload-artifact and softprops/action-gh-release
  # create a GitHub Release with the signed APK + AAB attached. Without this
  # the GITHUB_TOKEN can only read; release-creation 403's.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need parent commit for the diff in path-filter

      # v1.24.49 — figure out which APKs actually need rebuilding so we don't
      # always burn 10+ minutes on all four when only one source tree
      # changed. workflow_dispatch with target=auto behaves like a push:
      # auto-detect from the diff. target=all|phone|wear|faces|single
      # forces a specific subset.
      - name: Decide build targets
        id: targets
        run: |
          set -e
          TARGET="${{ github.event.inputs.target }}"
          [ -z "$TARGET" ] && TARGET="auto"
          echo "Requested target: $TARGET"

          BUILD_PHONE=false
          BUILD_WEAR=false
          BUILD_FACES=false
          BUILD_SINGLE=false

          if [ "$TARGET" = "all" ]; then
            BUILD_PHONE=true; BUILD_WEAR=true; BUILD_FACES=true; BUILD_SINGLE=true
          elif [ "$TARGET" = "phone" ]; then
            BUILD_PHONE=true
          elif [ "$TARGET" = "wear" ]; then
            BUILD_WEAR=true
          elif [ "$TARGET" = "faces" ]; then
            BUILD_FACES=true
          elif [ "$TARGET" = "single" ]; then
            BUILD_SINGLE=true
          else
            # auto — diff against parent. The Wear / Faces / Single all share
            # twa/android/wear/java/watchface so a change in any of those is
            # picked up by all three (overbuild slightly, never underbuild).
            BASE="${{ github.event.before }}"
            [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] && BASE="HEAD~1"
            CHANGED=$(git diff --name-only "$BASE" HEAD || git diff --name-only HEAD~1 HEAD || true)
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" | grep -qE "^(twa/android/twa-manifest.json|twa/android/widget-sources/)" && BUILD_PHONE=true || true
            echo "$CHANGED" | grep -qE "^twa/android/wear/" && { BUILD_WEAR=true; BUILD_FACES=true; BUILD_SINGLE=true; } || true
            # wear-faceonly/ changes also trigger single-face rebuild
            # because the single-face APK reuses LauncherActivity from there.
            echo "$CHANGED" | grep -qE "^twa/android/wear-faceonly/" && { BUILD_FACES=true; BUILD_SINGLE=true; } || true
            echo "$CHANGED" | grep -qE "^twa/android/wear-singleface/" && BUILD_SINGLE=true || true
            echo "$CHANGED" | grep -qE "^\.scripts/build-wear-apk\.sh$" && BUILD_WEAR=true || true
            echo "$CHANGED" | grep -qE "^\.scripts/build-wear-faceonly-apk\.sh$" && BUILD_FACES=true || true
            echo "$CHANGED" | grep -qE "^\.scripts/build-wear-singleface-apk\.sh$" && BUILD_SINGLE=true || true
            # Workflow itself or twa-manifest changes -> rebuild everything
            echo "$CHANGED" | grep -qE "^\.github/workflows/build-android-twa\.yml$|^twa/android/twa-manifest\.json$" \
              && { BUILD_PHONE=true; BUILD_WEAR=true; BUILD_FACES=true; BUILD_SINGLE=true; } || true
            # If nothing matched (manual dispatch with no change context), default to all
            if [ "$BUILD_PHONE$BUILD_WEAR$BUILD_FACES$BUILD_SINGLE" = "falsefalsefalsefalse" ]; then
              echo "No matching paths — defaulting to all"
              BUILD_PHONE=true; BUILD_WEAR=true; BUILD_FACES=true; BUILD_SINGLE=true
            fi
          fi

          echo "Selection: phone=$BUILD_PHONE wear=$BUILD_WEAR faces=$BUILD_FACES single=$BUILD_SINGLE"
          echo "phone=$BUILD_PHONE"   >> $GITHUB_OUTPUT
          echo "wear=$BUILD_WEAR"     >> $GITHUB_OUTPUT
          echo "faces=$BUILD_FACES"   >> $GITHUB_OUTPUT
          echo "single=$BUILD_SINGLE" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install Bubblewrap CLI + Python deps
        run: |
          npm install -g @bubblewrap/cli@latest
          python3 -m pip install --quiet cryptography

      - name: Pre-configure Bubblewrap to use the runner's JDK + SDK
        run: |
          # Without this file, `bubblewrap init` prompts:
          #   "Do you want Bubblewrap to install the JDK (recommended)?"
          # Our `yes |` pipe answered Y, which made Bubblewrap try to
          # download its own JDK over and over and eventually fail.
          # Writing the config up-front makes it skip both prompts.
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Decide signing mode
        id: sign
        run: |
          # Three modes, in priority order:
          # (1) GitHub Secrets ANDROID_* set        → production-via-secrets
          # (2) Encrypted blob in repo + ADMIN_TOKEN → production-via-blob
          # (3) Neither → auto-generate debug keystore (URL-bar build)
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Mode: production (GitHub Secrets)"
            echo "mode=production-secrets" >> $GITHUB_OUTPUT
          elif [ -f "${GITHUB_WORKSPACE}/.ci/twa/keystore.jks.b64" ]; then
            echo "Mode: production (vendored .ci/twa/keystore.jks.b64)"
            echo "mode=production-vendored" >> $GITHUB_OUTPUT
          else
            echo "Mode: debug (auto-generating)"
            echo "mode=debug" >> $GITHUB_OUTPUT
          fi

      - name: Restore production keystore from GitHub Secrets
        if: steps.sign.outputs.mode == 'production-secrets'
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS" | base64 -d > $RUNNER_TEMP/servia.jks
          echo "KEYSTORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          ls -la $RUNNER_TEMP/servia.jks

      - name: Restore production keystore from vendored files
        if: steps.sign.outputs.mode == 'production-vendored'
        run: |
          # The keystore was decoded once locally from the encrypted blob and
          # committed as a base64 file. No Python cryptography dependency
          # needed in CI — pure base64 + json. Repo is private so security
          # is equivalent to GitHub Secrets.
          set -e
          base64 -d "${GITHUB_WORKSPACE}/.ci/twa/keystore.jks.b64" > "$RUNNER_TEMP/servia.jks"
          python3 "${GITHUB_WORKSPACE}/.scripts/export-twa-creds.py" \
            "${GITHUB_WORKSPACE}/.ci/twa/creds.json"
          ls -la $RUNNER_TEMP/servia.jks

      - name: Generate debug keystore
        if: steps.sign.outputs.mode == 'debug'
        run: |
          keytool -genkeypair -v \
            -keystore $RUNNER_TEMP/servia.jks \
            -keyalg RSA -keysize 2048 -validity 365 \
            -alias servia \
            -storepass servia-debug-pass \
            -keypass servia-debug-pass \
            -dname "CN=Servia Debug, OU=Servia, O=Servia, L=Dubai, ST=Dubai, C=AE"
          echo "KEYSTORE_PASS=servia-debug-pass" >> $GITHUB_ENV
          echo "KEY_PASS=servia-debug-pass" >> $GITHUB_ENV
          echo "KEY_ALIAS=servia" >> $GITHUB_ENV
          keytool -list -v -keystore $RUNNER_TEMP/servia.jks \
            -storepass servia-debug-pass -alias servia | grep "SHA256" || true

      - name: Initialize Bubblewrap project (via @bubblewrap/core API, not CLI)
        run: |
          # WHY NOT `bubblewrap init`? The CLI uses inquirer prompts that
          # accumulate stdin chars rather than treating \n as Enter when
          # input is piped. Stdin-driven automation is impossible.
          # We bypass the CLI entirely and call @bubblewrap/core directly
          # via .scripts/twa-init.js (no prompts, all values pre-set).
          #
          # Local HTTP server is needed because:
          #   1. Bubblewrap requires a URL (not file path) for the manifest
          #   2. Cloudflare WAF on servia.ae returns 403 to non-browser UAs,
          #      blocking GitHub runners from fetching the live manifest.
          echo "=== Starting local HTTP server for web/ ==="
          cd "${GITHUB_WORKSPACE}/web"
          python3 -m http.server 8080 > /tmp/http-server.log 2>&1 &
          SERVER_PID=$!
          for i in {1..10}; do
            if curl -fsSL http://localhost:8080/manifest.webmanifest > /dev/null 2>&1; then
              echo "Local server up on port 8080 (PID $SERVER_PID)"
              break
            fi
            sleep 0.5
          done
          echo ""
          echo "=== Generating TWA project via @bubblewrap/core API ==="
          rm -rf "${GITHUB_WORKSPACE}/twa/android/generated"
          mkdir -p "${GITHUB_WORKSPACE}/twa/android/generated"
          node "${GITHUB_WORKSPACE}/.scripts/twa-init.js" \
            http://localhost:8080/manifest.webmanifest \
            "${GITHUB_WORKSPACE}/twa/android/generated" \
            ae.servia.app
          INIT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          if [ "$INIT_EXIT" != "0" ]; then
            echo "=== HTTP server log (debug) ==="
            cat /tmp/http-server.log || true
            exit $INIT_EXIT
          fi
          echo ""
          echo "=== Generated project ==="
          cd "${GITHUB_WORKSPACE}/twa/android/generated"
          ls -la
          if [ -d app ]; then echo "--- app/ ---"; ls -la app/; fi


      - name: Inject home-screen widgets (QuickBook + TrackBooking)
        run: |
          chmod +x "${GITHUB_WORKSPACE}/.scripts/inject-widgets.py"
          python3 "${GITHUB_WORKSPACE}/.scripts/inject-widgets.py" \
            "${GITHUB_WORKSPACE}/twa/android/generated"

      - name: Inject custom LauncherActivity (proactive POST_NOTIFICATIONS request)
        run: |
          # v1.24.208 — Bubblewrap's auto-generated LauncherActivity only sets
          # orientation; it never requests POST_NOTIFICATIONS, so on Android 13+
          # the OS-level notification toggle stays OFF in app Settings even
          # after Chrome's web push permission is granted via JS. Founder
          # reported in-app Allow succeeds but Settings > Apps > Servia >
          # Notifications stays disabled, so no push ever reaches the device.
          # We replace the stub with one that requests POST_NOTIFICATIONS in
          # onCreate so the native Android prompt appears on first launch.
          SRC="${GITHUB_WORKSPACE}/twa/android/LauncherActivity.java.template"
          DST="${GITHUB_WORKSPACE}/twa/android/generated/app/src/main/java/ae/servia/app/LauncherActivity.java"
          if [ ! -f "$SRC" ]; then
            echo "ERROR: template missing at $SRC"; exit 1
          fi
          if [ ! -f "$DST" ]; then
            echo "ERROR: generated LauncherActivity missing at $DST"; exit 1
          fi
          cp "$SRC" "$DST"
          echo "=== LauncherActivity.java after injection ==="
          head -30 "$DST"

      - name: Inject Android permissions into AndroidManifest
        working-directory: twa/android/generated/app/src/main
        run: |
          # Pre-declare every Android permission the app might EVER need.
          # CRITICAL: declared permissions in the APK don't require Play
          # Store re-submission later — getUserMedia() / Geolocation /
          # File API / Push from the website all just work as long as the
          # APK declares the corresponding android.permission.* upfront.
          # Without this, future website features that ask for camera /
          # mic / files would silently fail in TWA mode.
          if [ ! -f AndroidManifest.xml ]; then
            echo "ERROR: AndroidManifest.xml not found"; exit 1
          fi
          echo "=== Original AndroidManifest.xml head ==="
          head -25 AndroidManifest.xml
          # Build a permission-block to inject right after <manifest ...> tag.
          PERMS='
          <uses-permission android:name="android.permission.INTERNET" />
          <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
          <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
          <uses-permission android:name="android.permission.VIBRATE" />
          <uses-permission android:name="android.permission.WAKE_LOCK" />
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
          <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
          <uses-permission android:name="android.permission.USE_BIOMETRIC" />
          <uses-permission android:name="android.permission.USE_FINGERPRINT" />
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
          <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
          <uses-permission android:name="android.permission.CAMERA" />
          <uses-permission android:name="android.permission.RECORD_AUDIO" />
          <uses-permission android:name="android.permission.READ_CONTACTS" />
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
          <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
          <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
          <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" tools:ignore="ScopedStorage" />
          <uses-permission android:name="android.permission.READ_PHONE_STATE" />
          <uses-permission android:name="android.permission.CALL_PHONE" />
          <uses-feature android:name="android.hardware.camera" android:required="false" />
          <uses-feature android:name="android.hardware.location" android:required="false" />
          <uses-feature android:name="android.hardware.location.gps" android:required="false" />
          <uses-feature android:name="android.hardware.microphone" android:required="false" />
          <uses-feature android:name="android.hardware.fingerprint" android:required="false" />'
          # Inject permissions block after <manifest ...> opening tag
          # using awk for predictable whitespace handling.
          awk -v perms="$PERMS" '
            /<manifest[^>]*>/ && !injected {
              print $0
              print perms
              injected = 1
              next
            }
            { print }
          ' AndroidManifest.xml > AndroidManifest.tmp.xml
          mv AndroidManifest.tmp.xml AndroidManifest.xml
          # Also add tools:ignore namespace if missing
          if ! grep -q "xmlns:tools" AndroidManifest.xml; then
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' AndroidManifest.xml
          fi
          echo ""
          echo "=== AndroidManifest.xml after injection (first 60 lines) ==="
          head -60 AndroidManifest.xml

      - name: Build AAB + APK via gradle (non-interactive)
        if: steps.targets.outputs.phone == 'true'
        env:
          KS_PATH:  ${{ runner.temp }}/servia.jks
        working-directory: twa/android/generated
        run: |
          chmod +x ./gradlew
          # KEYSTORE_PASS / KEY_PASS / KEY_ALIAS are exported by the
          # signing-mode step above and live in $GITHUB_ENV.
          ./gradlew --no-daemon \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            bundleRelease assembleRelease
          echo ""
          echo "Outputs:"
          find app/build/outputs -type f \( -name "*.aab" -o -name "*.apk" \) -exec ls -la {} \;

      - name: Generate assetlinks.json sample
        if: steps.targets.outputs.phone == 'true'
        working-directory: twa/android/generated
        env:
          KS_PATH: ${{ runner.temp }}/servia.jks
        run: |
          # Extract SHA-256 of the signed APK's cert + emit assetlinks.json
          # the user can drop into web/.well-known/ if the fingerprint differs
          # from the one we baked in.
          SHA=$(keytool -list -v -keystore "$KS_PATH" -storepass "$KEYSTORE_PASS" -alias "$KEY_ALIAS" 2>/dev/null \
                | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "[" > assetlinks.json
          echo "  {" >> assetlinks.json
          echo '    "relation": ["delegate_permission/common.handle_all_urls"],' >> assetlinks.json
          echo '    "target": {' >> assetlinks.json
          echo '      "namespace": "android_app",' >> assetlinks.json
          echo '      "package_name": "ae.servia.app",' >> assetlinks.json
          echo "      \"sha256_cert_fingerprints\": [\"$SHA\"]" >> assetlinks.json
          echo '    }' >> assetlinks.json
          echo "  }" >> assetlinks.json
          echo "]" >> assetlinks.json
          echo ""
          echo "================================================================"
          echo "  This APK's SHA-256: $SHA"
          echo ""
          echo "  If different from web/.well-known/assetlinks.json, the TWA"
          echo "  will open with a Chrome URL bar instead of full-screen."
          echo "  Update the fingerprint in the repo and redeploy."
          echo "================================================================"
          cat assetlinks.json

      - name: Copy outputs to a single artifacts dir
        if: steps.targets.outputs.phone == 'true'
        working-directory: twa/android/generated
        run: |
          mkdir -p _artifacts
          # v1.24.49 — versioned filename only (matches the wear builds).
          APP_VERSION=$(grep -E 'APP_VERSION\s*=' "${GITHUB_WORKSPACE}/app/config.py" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          BUILD_TS=$(date -u +%Y%m%d-%H%M)
          SUFFIX="v${APP_VERSION}-${BUILD_TS}"
          find app/build/outputs/bundle/release -name "*.aab" -exec cp {} "_artifacts/servia-twa-${SUFFIX}.aab" \;
          find app/build/outputs/apk/release    -name "*.apk" -exec cp {} "_artifacts/servia-twa-${SUFFIX}.apk" \;
          cp assetlinks.json _artifacts/ 2>/dev/null || true
          echo "$SUFFIX" > _artifacts/TWA_BUILD_INFO.txt
          echo "Final artifacts:"
          ls -la _artifacts/

      - name: Upload phone AAB + APK + assetlinks
        if: steps.targets.outputs.phone == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: servia-android-twa
          path: twa/android/generated/_artifacts/*
          if-no-files-found: error
          retention-days: 30

      # v1.24.208 — Auto-push AAB to Play Store internal-testing track if a
      # service-account JSON is configured in repo secrets as
      # GOOGLE_PLAY_SERVICE_ACCOUNT_JSON. If the secret is missing the step
      # is skipped (NOT failed) so the build still succeeds. One-time setup
      # for the founder: Play Console → Setup → API access → create service
      # account → grant "Release manager" → download JSON → paste into
      # GitHub Settings → Secrets → New repository secret.
      - name: Check Play Store service-account secret
        id: gp_check
        if: steps.targets.outputs.phone == 'true'
        run: |
          if [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "::notice::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret not set — skipping Play Store upload. Add it under repo Settings → Secrets to enable auto-upload to internal testing."
          fi

      - name: Locate AAB for Play Store upload
        id: locate_aab
        if: steps.gp_check.outputs.present == 'true'
        run: |
          AAB=$(find twa/android/generated/_artifacts -maxdepth 1 -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then echo "no AAB found"; exit 1; fi
          echo "path=$AAB" >> $GITHUB_OUTPUT

      - name: Upload AAB to Play Store internal-testing track
        if: steps.gp_check.outputs.present == 'true'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ae.servia.app
          releaseFiles: ${{ steps.locate_aab.outputs.path }}
          track: internal
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: twa/android/whatsnew

      # -----------------------------------------------------------------
      # Wear OS standalone APK build (v1.22.83 re-enabled).
      #
      # Previous attempts produced no APK because the deprecated
      # com.google.android.support:wearable artifact silently failed
      # dependency resolution. Now using a minimal plain-Android project
      # — no androidx.wear, no support-wearable — only compileOnly
      # wearable jar for the <uses-library> manifest entry.
      #
      # `continue-on-error: true` so a broken Wear build never tanks the
      # primary phone APK release. Phone APK is the must-ship artefact.
      # -----------------------------------------------------------------
      - name: Build Wear OS standalone APK
        id: wear_build
        if: steps.targets.outputs.wear == 'true'
        continue-on-error: true
        env:
          KS_PATH: ${{ runner.temp }}/servia.jks
        run: |
          chmod +x .scripts/build-wear-apk.sh
          # Run the build but ALWAYS leave _artifacts populated with logs
          # so the upload step has something to capture.
          if ! .scripts/build-wear-apk.sh "$KS_PATH"; then
            echo "::warning::Wear OS build FAILED — diagnostic logs uploaded as servia-android-wear artifact"
            mkdir -p twa/android/wear-build/_artifacts
            echo "Wear build failed in CI run ${{ github.run_id }}." \
              > twa/android/wear-build/_artifacts/_BUILD_FAILED.txt
          fi
          # Whatever happened, list what we have
          ls -la twa/android/wear-build/_artifacts/ 2>/dev/null || true

      - name: Upload Wear OS APK + AAB + diagnostic logs
        # Always upload — even on Wear build failure we want the gradle
        # log + tree dump so we can debug from outside the runner.
        if: always() && hashFiles('twa/android/wear-build/_artifacts/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: servia-android-wear
          path: twa/android/wear-build/_artifacts/*
          if-no-files-found: warn
          retention-days: 30

      # v1.24.43 — also build a STANDALONE Servia Faces APK that contains
      # ONLY the 22 watch face services (no tiles, no extra activities).
      # Used as A/B test against the main Servia Wear APK — if this
      # standalone shows up in the system watch face picker but the main
      # app's faces don't, co-packaging was the cause.
      - name: Build standalone Servia Faces APK
        id: faces_build
        if: steps.targets.outputs.faces == 'true'
        env:
          KS_PATH: ${{ env.RUNNER_TEMP }}/servia.jks
        run: |
          chmod +x .scripts/build-wear-faceonly-apk.sh
          if ! .scripts/build-wear-faceonly-apk.sh "$RUNNER_TEMP/servia.jks"; then
            echo "::warning::Servia Faces standalone build FAILED — diagnostic logs uploaded"
          fi
          ls -la twa/android/wear-faceonly-build/_artifacts/ 2>/dev/null || true

      - name: Upload Servia Faces standalone artifacts
        if: always() && hashFiles('twa/android/wear-faceonly-build/_artifacts/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: servia-faces-standalone
          path: twa/android/wear-faceonly-build/_artifacts/*
          if-no-files-found: warn
          retention-days: 30

      # v1.24.43 — also build a SINGLE-FACE APK (just ServiaFace01).
      # Different applicationId so it installs alongside both other APKs.
      # Used as the most-stripped-down diagnostic: if even THIS doesn't
      # appear in the watch face picker, the issue is environmental.
      - name: Build Servia Single Face APK
        id: single_build
        if: steps.targets.outputs.single == 'true'
        run: |
          chmod +x .scripts/build-wear-singleface-apk.sh
          if ! .scripts/build-wear-singleface-apk.sh "$RUNNER_TEMP/servia.jks"; then
            echo "::warning::Servia Single Face build FAILED — diagnostic logs uploaded"
          fi
          ls -la twa/android/wear-singleface-build/_artifacts/ 2>/dev/null || true

      - name: Upload Servia Single Face artifacts
        if: always() && hashFiles('twa/android/wear-singleface-build/_artifacts/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: servia-single-face
          path: twa/android/wear-singleface-build/_artifacts/*
          if-no-files-found: warn
          retention-days: 30

      # Push the Wear gradle log + dirtree to a debug branch so it's
      # readable via `git pull origin ci-wear-debug` from the development
      # sandbox (which can't reach the GH artifact CDN). Only the small
      # log files are pushed — no APKs.
      - name: Push Wear log to ci-wear-debug branch
        # v1.24.44: also push the standalone faces + single-face logs so
        # the dev sandbox (which can't reach Azure blob for artifact zips)
        # can diagnose those builds via github.com.
        if: always()
        run: |
          set -e
          mkdir -p _ci_wear_log
          cp -v twa/android/wear-build/_artifacts/wear-gradle-tail.txt _ci_wear_log/ 2>/dev/null || true
          cp -v twa/android/wear-build/_artifacts/wear-found.txt       _ci_wear_log/ 2>/dev/null || true
          cp -v twa/android/wear-build/_artifacts/wear-dirtree.txt     _ci_wear_log/ 2>/dev/null || true
          # Faces standalone + single-face logs
          cp -v twa/android/wear-faceonly-build/_artifacts/faces-gradle-tail.txt   _ci_wear_log/ 2>/dev/null || true
          cp -v twa/android/wear-faceonly-build/_artifacts/faces-found.txt         _ci_wear_log/ 2>/dev/null || true
          cp -v twa/android/wear-singleface-build/_artifacts/single-gradle-tail.txt _ci_wear_log/ 2>/dev/null || true
          cp -v twa/android/wear-singleface-build/_artifacts/single-found.txt       _ci_wear_log/ 2>/dev/null || true
          # Capture full build dirs in case the partial setup itself failed
          (find twa/android/wear-faceonly-build  -type f 2>/dev/null | head -100 > _ci_wear_log/faces-tree.txt) || true
          (find twa/android/wear-singleface-build -type f 2>/dev/null | head -100 > _ci_wear_log/single-tree.txt) || true
          ls -la _ci_wear_log/
          if [ -z "$(ls -A _ci_wear_log/ 2>/dev/null)" ]; then
            echo "::warning::no logs to push"
            exit 0
          fi
          git config user.email "ci-bot@servia.ae"
          git config user.name  "Servia CI"
          git checkout --orphan ci-wear-debug
          git rm -rf . 2>/dev/null || true
          mv _ci_wear_log/* . 2>/dev/null || true
          rmdir _ci_wear_log 2>/dev/null || true
          echo "Run: ${{ github.run_id }}  Tag: ${{ github.ref_name }}  $(date -u)" > _RUN.txt
          git add -A
          git commit -m "ci-wear-debug ${{ github.ref_name }} run ${{ github.run_id }}" || true
          git push -f origin ci-wear-debug || echo "::warning::push to ci-wear-debug failed"

      - name: Print install + Play Store instructions
        run: |
          echo ""
          echo "==================================================="
          echo "  ✅ Build complete. Download artifacts (this run → Artifacts → servia-android-twa.zip)."
          echo ""
          echo "  TO INSTALL FOR TESTING (any Android phone):"
          echo "  1. Download servia-android-twa.zip on your phone"
          echo "  2. Unzip → tap app-release-signed.apk"
          echo "  3. Settings → Security → 'Install unknown apps' (allow)"
          echo "  4. Tap APK → Install. Servia icon appears on home screen."
          echo ""
          echo "  TO PUBLISH TO PLAY STORE (production secrets set):"
          echo "  1. Download app-release-bundle.aab"
          echo "  2. play.google.com/console (\$25 one-time fee)"
          echo "  3. Create app → upload AAB → fill data-safety + screenshots"
          echo "  4. Privacy URL: https://servia.ae/privacy.html"
          echo "  5. Submit for review (1-7 day wait)"
          echo ""
          echo "  CRITICAL FOR FULL-SCREEN MODE:"
          echo "  Compare the SHA-256 in the artifact's assetlinks.json with"
          echo "  web/.well-known/assetlinks.json on the website. If they"
          echo "  differ, update the website's file and redeploy."
          echo "==================================================="

      # v1.24.195 — Commit final AAB + APK outputs to _release/android/
      # so the founder (mobile-only, can't auth-download artifacts) can
      # grab them via raw GitHub URLs without login. Mirrors the pattern
      # used by play-verification-build.yml.
      - name: Commit phone + wear outputs to _release/android/
        if: always()
        run: |
          set +e
          mkdir -p _release/android
          # Phone TWA — final APK + AAB + assetlinks
          find twa/android/generated/_artifacts -maxdepth 1 -name "*.apk" \
            -exec cp -v {} _release/android/servia-phone.apk \; 2>/dev/null
          find twa/android/generated/_artifacts -maxdepth 1 -name "*.aab" \
            -exec cp -v {} _release/android/servia-phone.aab \; 2>/dev/null
          cp -v twa/android/generated/_artifacts/assetlinks.json _release/android/ 2>/dev/null
          # Wear OS — v1.24.204 — fix path: build script outputs servia-wear.apk / .aab
          # (no "-signed" suffix). Earlier copy with the wrong filename silently
          # dropped the wear outputs even though the build succeeded.
          cp -v twa/android/wear-build/_artifacts/servia-wear.apk _release/android/ 2>/dev/null
          cp -v twa/android/wear-build/_artifacts/servia-wear.aab _release/android/ 2>/dev/null
          # Watch face standalone + single
          cp -v twa/android/wear-faceonly-build/_artifacts/*.apk    _release/android/servia-faces.apk    2>/dev/null
          cp -v twa/android/wear-singleface-build/_artifacts/*.apk  _release/android/servia-singleface.apk 2>/dev/null
          # Build info file
          {
            echo "Build: ${GITHUB_SHA::7}"
            echo "Run:   https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Date:  $(date -u)"
            echo ""
            echo "Files in this directory:"
            ls -la _release/android/
          } > _release/android/BUILD_INFO.txt
          echo "--- _release/android/ contents ---"
          ls -la _release/android/
          # Commit only if something changed
          git config user.email "ci-bot@servia.ae"
          git config user.name "Servia CI"
          git add _release/android/ 2>/dev/null
          if git diff --cached --quiet; then
            echo "::notice::No artifacts changed — skipping commit"
            exit 0
          fi
          git commit -m "ci: commit android build outputs (run ${GITHUB_RUN_ID})" || exit 0
          # Retry push 4x with backoff in case main moved between fetch + push
          for i in 1 2 3 4; do
            git pull --rebase --autostash origin main 2>&1 || true
            if git push origin HEAD:main; then
              echo "::notice::Artifacts pushed to _release/android/"
              break
            fi
            sleep $((2**i))
          done

      # -----------------------------------------------------------------
      - name: Publish GitHub Release with APK + AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Servia ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Servia Android ${{ github.ref_name }}

            ### Install
            Download `app-release-signed.apk` below and tap it on your Android phone. Allow "Install unknown apps" if prompted.

            ### What changed
            See commit history since previous tag.
          files: |
            twa/android/generated/_artifacts/app-release-signed.apk
            twa/android/generated/_artifacts/app-release-bundle.aab
            twa/android/generated/_artifacts/assetlinks.json
            twa/android/wear-build/_artifacts/servia-wear-signed.apk
            twa/android/wear-build/_artifacts/servia-wear-bundle.aab
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
