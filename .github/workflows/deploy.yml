name: Fetch failed deploy logs
on: { push: { branches: [main] }, workflow_dispatch: {} }
permissions: { contents: write }

env:
  PID: 15485030-5fc0-44e4-afc7-02f2cdc1d22f
  SID: e8c4d684-c92b-4346-899d-498f580841ae
  EID: 4d8c32c6-f62b-4bbc-85ca-3403bb22e397

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env: { T: "${{ secrets.RAILWAY_TOKEN }}" }
        run: |
          set +e
          API=https://backboard.railway.com/graphql/v2
          gql() { curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" -d "$1"; }

          # Get latest 3 deployments
          D=$(gql "$(jq -n '{query:"query{ deployments(input:{projectId:\"'$PID'\", serviceId:\"'$SID'\"}, first:3){ edges{ node{ id status createdAt } } } }"}')")
          echo "deployments:" > /tmp/o
          echo "$D" | jq . >> /tmp/o

          for DID in $(echo "$D" | jq -r '.data.deployments.edges[].node.id'); do
            echo "" >> /tmp/o
            echo "=== build logs for $DID ===" >> /tmp/o
            BL=$(gql "$(jq -n --arg id "$DID" '{query:"query($id: String!){ buildLogs(deploymentId:$id, limit:200){ message timestamp severity } }", variables:{id:$id}}')")
            echo "$BL" | jq -r '.data.buildLogs[]? | "[\(.timestamp)] \(.severity // "info"): \(.message)"' | head -80 >> /tmp/o
            echo "" >> /tmp/o
            echo "=== deploy logs for $DID ===" >> /tmp/o
            DL=$(gql "$(jq -n --arg id "$DID" '{query:"query($id: String!){ deploymentLogs(deploymentId:$id, limit:120){ message timestamp severity } }", variables:{id:$id}}')")
            echo "$DL" | jq -r '.data.deploymentLogs[]? | "[\(.timestamp)] \(.severity // "info"): \(.message)"' | head -60 >> /tmp/o
          done

          {
            echo "# Failed deploy logs"
            echo
            echo '```'
            cat /tmp/o
            echo '```'
          } > DEPLOYED.md

          git config user.email d@a; git config user.name d
          git add DEPLOYED.md
          git commit -m "logs" || true
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || true
