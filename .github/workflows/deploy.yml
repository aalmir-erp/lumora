name: Status check
on: { push: { branches: [main] }, workflow_dispatch: {} }
permissions: { contents: write }

env:
  PID: 15485030-5fc0-44e4-afc7-02f2cdc1d22f
  SID: e8c4d684-c92b-4346-899d-498f580841ae
  EID: 4d8c32c6-f62b-4bbc-85ca-3403bb22e397

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe deploys
        env:
          T: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          API=https://backboard.railway.com/graphql/v2
          gql() { curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" -d "$1"; }

          # Try a few different deployment query shapes
          {
            echo "# Deploy status probe"
            echo
            echo "## Service detail (with source + state)"
            P=$(gql "$(jq -n '{query:"query{ project(id:\"'$PID'\"){ id name services{ edges{ node{ id name source{ repo template image } templateServiceId serviceInstances{ edges{ node{ id environmentId latestDeployment{ id status url staticUrl createdAt updatedAt meta } source{ repo template image } isUpdatable suspend } } } } } } } }"}')")
            echo '```json'
            echo "$P" | jq .
            echo '```'

            echo
            echo "## All deployments query (project-level)"
            D=$(gql "$(jq -n '{query:"query{ deployments(input:{projectId:\"'$PID'\"}, first:10){ edges{ node{ id status createdAt staticUrl url meta } } } }"}')")
            echo '```json'
            echo "$D" | jq .
            echo '```'

            echo
            echo "## Health check on assigned domain"
            curl -sS -i --max-time 10 https://lumora-production-4071.up.railway.app/api/health 2>&1 | head -25
          } > DEPLOYED.md

          git config user.email d@a; git config user.name d
          git add DEPLOYED.md
          git commit -m "status probe" || true
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || true
