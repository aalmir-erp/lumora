name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Verify auth
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway whoami

      - name: Init or link project
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway init --name lumora 2>&1 | tee /tmp/init.log || true
          # Show current link
          railway status 2>&1 || true

      - name: Set env vars
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables \
            --set "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" \
            --set "BRAND_NAME=Lumora" \
            --set "CLAUDE_MODEL=claude-opus-4-7" \
            --set "DEMO_MODE=auto" \
            --set "DB_PATH=/data/lumora.db"

      - name: Add persistent volume
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway volume add --mount-path /data 2>&1 | tee -a /tmp/init.log || true

      - name: Deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci

      - name: Generate public domain
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway domain 2>&1 | tee /tmp/domain.log || true

      - name: Summary
        if: always()
        run: |
          echo "## Lumora deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 60 /tmp/init.log /tmp/domain.log 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
