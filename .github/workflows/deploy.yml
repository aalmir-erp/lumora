name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI (npm — pinned)
        run: |
          npm i -g @railway/cli@latest
          railway --version

      - name: Probe both auth env vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "--- whoami via RAILWAY_API_TOKEN only ---"
          (env -u RAILWAY_TOKEN railway whoami 2>&1 || echo "[fail-API-only]") | head -5
          echo
          echo "--- whoami via RAILWAY_TOKEN only ---"
          (env -u RAILWAY_API_TOKEN railway whoami 2>&1 || echo "[fail-PROJ-only]") | head -5
          echo
          echo "--- list (test command) ---"
          railway list 2>&1 | head -20 || true

      - name: Init project (uses whichever env worked)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          railway init --name lumora 2>&1 | tee /tmp/init.log

      - name: Set env vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables \
            --set "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" \
            --set "BRAND_NAME=Lumora" \
            --set "CLAUDE_MODEL=claude-opus-4-7" \
            --set "DEMO_MODE=auto" \
            --set "DB_PATH=/data/lumora.db" 2>&1 | tee /tmp/vars.log

      - name: Add volume
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway volume add --mount-path /data 2>&1 | tee /tmp/vol.log || true

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci 2>&1 | tee /tmp/up.log

      - name: Generate domain
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway domain 2>&1 | tee /tmp/domain.log || true

      - name: Status
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "## Railway deploy logs" >> "$GITHUB_STEP_SUMMARY"
          for f in /tmp/init.log /tmp/vars.log /tmp/vol.log /tmp/up.log /tmp/domain.log; do
            if [ -f "$f" ]; then
              echo -e "\n### $f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -n 50 "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          railway status 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Diagnostic — capture everything to DEPLOYED.md
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          T="$RAILWAY_TOKEN"
          API=https://backboard.railway.com/graphql/v2
          tmp=/tmp/diag
          mkdir -p $tmp

          # Probe several GraphQL shapes
          for QF in \
            'workspaces' \
            'teams' \
            'projects' \
            'projectToken { projectId environmentId }' \
            'me { id email }' ; do
              echo "--- query: $QF ---"
              curl -sS -X POST $API \
                -H "Authorization: Bearer $T" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg q "{ $QF }" '{query:$q}')" | jq -c .
              echo
            done > $tmp/probe.txt 2>&1

          # Try team-scoped projects via __typename probe
          cat > $tmp/q.json <<'GQL'
          {"query":"query { __schema { queryType { fields { name args { name type { name kind } } } } } }"}
          GQL
          curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" \
            -d @$tmp/q.json | jq '.data.__schema.queryType.fields[] | select(.name | test("project|workspace|team|me"; "i")) | {name, args}' > $tmp/schema.json 2>&1

          # Inspect what files railway init left behind
          ls -la .railway/ railway.toml 2>&1 > $tmp/files.txt

          {
            echo "# Lumora deploy — diagnostic"
            echo
            echo "## GraphQL probes"
            echo '```'
            cat $tmp/probe.txt
            echo '```'
            echo
            echo "## Schema (project/workspace/team fields)"
            echo '```json'
            cat $tmp/schema.json
            echo '```'
            echo
            echo "## Files railway left in working dir"
            echo '```'
            cat $tmp/files.txt
            echo '```'
            echo
            echo "## .railway/config.json (if present)"
            echo '```json'
            cat .railway/config.json 2>&1 | head -40
            echo '```'
          } > DEPLOYED.md

          git config user.email "deploy@github-actions"
          git config user.name "Lumora deploy bot"
          git add DEPLOYED.md
          git commit -m "diagnostic dump" || true
          git push origin HEAD:main || true
