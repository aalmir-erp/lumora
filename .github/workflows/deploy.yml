name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI (npm — pinned)
        run: |
          npm i -g @railway/cli@latest
          railway --version

      - name: Probe both auth env vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "--- whoami via RAILWAY_API_TOKEN only ---"
          (env -u RAILWAY_TOKEN railway whoami 2>&1 || echo "[fail-API-only]") | head -5
          echo
          echo "--- whoami via RAILWAY_TOKEN only ---"
          (env -u RAILWAY_API_TOKEN railway whoami 2>&1 || echo "[fail-PROJ-only]") | head -5
          echo
          echo "--- list (test command) ---"
          railway list 2>&1 | head -20 || true

      - name: Init project (uses whichever env worked)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          railway init --name lumora 2>&1 | tee /tmp/init.log

      - name: Set env vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables \
            --set "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" \
            --set "BRAND_NAME=Lumora" \
            --set "CLAUDE_MODEL=claude-opus-4-7" \
            --set "DEMO_MODE=auto" \
            --set "DB_PATH=/data/lumora.db" 2>&1 | tee /tmp/vars.log

      - name: Add volume
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway volume add --mount-path /data 2>&1 | tee /tmp/vol.log || true

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci 2>&1 | tee /tmp/up.log

      - name: Generate domain
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway domain 2>&1 | tee /tmp/domain.log || true

      - name: Status
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "## Railway deploy logs" >> "$GITHUB_STEP_SUMMARY"
          for f in /tmp/init.log /tmp/vars.log /tmp/vol.log /tmp/up.log /tmp/domain.log; do
            if [ -f "$f" ]; then
              echo -e "\n### $f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -n 50 "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          railway status 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Audit — find where the deploy went + create lumora project explicitly
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          API=https://backboard.railway.com/graphql/v2

          # 1) Recent deployments per project
          for PID in 29ccb6ed-90ae-4519-8ff2-782978eb032f bb1bd651-a599-466a-aa46-cde69c794b06; do
            echo "=== project $PID — last 5 deployments ==="
            curl -sS -X POST $API -H "Authorization: Bearer $RAILWAY_TOKEN" -H "Content-Type: application/json" \
              -d "$(jq -n --arg q 'query { deployments(input: { projectId: \"'$PID'\" }, first: 5) { edges { node { id status createdAt staticUrl service { id name } environment { name } } } } }' '{query:$q}')" | jq .
          done > /tmp/deployments.json 2>&1

          # 2) Try a fresh project named 'lumora' (use mutation directly, skip CLI which ignores --name)
          MUT='mutation($input: ProjectCreateInput!) { projectCreate(input: $input) { id name } }'
          CREATE=$(curl -sS -X POST $API -H "Authorization: Bearer $RAILWAY_TOKEN" -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$MUT" '{query:$q, variables:{input:{name:"lumora"}}}')")
          echo "$CREATE" > /tmp/create.json

          {
            echo "# Audit"
            echo
            echo "## Deployments per project"
            echo '```json'
            cat /tmp/deployments.json
            echo '```'
            echo
            echo "## projectCreate(name=lumora)"
            echo '```json'
            cat /tmp/create.json | jq .
            echo '```'
          } > DEPLOYED.md

          git config user.email "deploy@github-actions"; git config user.name "Lumora deploy bot"
          git add DEPLOYED.md
          git commit -m "audit: find where deploy went" || true
          git push origin HEAD:main || true
