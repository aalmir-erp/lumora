name: Deploy Lumora to Railway
on: { push: { branches: [main] }, workflow_dispatch: {} }
permissions: { contents: write }
concurrency: { group: railway-deploy, cancel-in-progress: false }
env:
  PID: 15485030-5fc0-44e4-afc7-02f2cdc1d22f

jobs:
  introspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Introspect mutations
        env:
          T: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          API=https://backboard.railway.com/graphql/v2
          DIAG=/tmp/diag.md
          : > $DIAG
          gql() { curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" -d "$(jq -n --arg q "$1" '{query:$q}')"; }

          # 1) List mutation names matching keywords
          R=$(gql 'query { __schema { mutationType { fields { name args { name type { name kind ofType { name kind ofType { name kind } } } } } } } }')
          echo "$R" | jq '.data.__schema.mutationType.fields[]| select(.name | test("ServiceCreate|ServiceConnect|ServiceInstance|projectTokenCreate|ServiceDomain|deploymentTrigger"; "i"))' > /tmp/muts.json
          cat /tmp/muts.json

          {
            echo "# Mutation introspection"
            echo
            echo "## Relevant mutations + arg shapes"
            echo '```json'
            cat /tmp/muts.json
            echo '```'
            echo
            echo "## Detail: ServiceCreateInput"
            echo '```json'
            curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" \
              -d "$(jq -n '{query:"{ __type(name: \"ServiceCreateInput\") { name inputFields { name type { name kind ofType { name kind } } } } }"}')" | jq .
            echo '```'
            echo
            echo "## Detail: ServiceConnectInput"
            echo '```json'
            curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" \
              -d "$(jq -n '{query:"{ __type(name: \"ServiceConnectInput\") { name inputFields { name type { name kind ofType { name kind } } } } }"}')" | jq .
            echo '```'
            echo
            echo "## Detail: ServiceSourceInput"
            echo '```json'
            curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" \
              -d "$(jq -n '{query:"{ __type(name: \"ServiceSourceInput\") { name inputFields { name type { name kind ofType { name kind } } } } }"}')" | jq .
            echo '```'
            echo
            echo "## Detail: ProjectTokenCreateInput"
            echo '```json'
            curl -sS -X POST $API -H "Authorization: Bearer $T" -H "Content-Type: application/json" \
              -d "$(jq -n '{query:"{ __type(name: \"ProjectTokenCreateInput\") { name inputFields { name type { name kind ofType { name kind } } } } }"}')" | jq .
            echo '```'
          } > DEPLOYED.md
          git config user.email d@a; git config user.name d
          git add DEPLOYED.md
          git commit -m "introspect" || true
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || true
