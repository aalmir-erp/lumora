<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="Servia cleaning">
  <defs>
    <radialGradient id="bg" cx="0.45" cy="0.4" r="0.7"><stop offset="0%" stop-color="#14B8A6"/><stop offset="60%" stop-color="#0D9488"/><stop offset="100%" stop-color="#0F766E"/></radialGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#FB7185" stop-opacity="0.55"/><stop offset="100%" stop-color="#FB7185" stop-opacity="0"/></radialGradient>
    <radialGradient id="face" cx="0.45" cy="0.4" r="0.65"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FCD34D"/></radialGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="duster" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient>
  </defs>
  <circle cx="110" cy="110" r="100" fill="url(#bg)"/>
  <ellipse cx="86" cy="68" rx="56" ry="30" fill="#fff" opacity="0.08"/>
  <g fill="#FCD34D">
    <circle cx="178" cy="40" r="2.6"><animate attributeName="r" values="2.6;4.4;2.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="34" cy="58" r="2.1"><animate attributeName="r" values="2.1;3.6;2.1" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>
  <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="2.6s" repeatCount="indefinite"/>
    <!-- duster (cleaning prop) -->
    <g transform="translate(50 130)">
      <animateTransform attributeName="transform" type="rotate" values="-15 0 0; 12 0 0; -15 0 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>
      <rect x="-2" y="0" width="4" height="36" fill="#92400E" rx="2"/>
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="url(#duster)"/>
      <path d="M-13 -2 L-19 -10 M-7 -8 L-9 -16 M0 -10 L0 -18 M7 -8 L9 -16 M13 -2 L19 -10" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- spray bottle -->
    <g transform="translate(170 132)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;-12 0 0;0 0 0" dur="2s" repeatCount="indefinite" additive="sum"/>
      <rect x="-3" y="0" width="6" height="24" rx="3" fill="#FCD34D"/>
      <circle cx="0" cy="26" r="7" fill="#FCD34D"/>
    </g>
    <path d="M60 198 Q60 142 110 142 Q160 142 160 198 Z" fill="#FFFFFF"/>
    <rect x="96" y="158" width="28" height="14" rx="4" fill="#0D9488"/>
    <text x="110" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="9" fill="#FFFFFF">SERVIA</text>
    <circle cx="110" cy="100" r="42" fill="url(#face)"/>
    <ellipse cx="84" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="136" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="93" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <ellipse cx="127" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <circle cx="95" cy="97" r="2" fill="#FFFFFF"/>
    <circle cx="129" cy="97" r="2" fill="#FFFFFF"/>
    <path d="M92 122 Q110 138 128 122" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M70 86 Q70 60 110 60 Q150 60 150 86 Q150 76 142 70 Q126 56 110 56 Q94 56 78 70 Q70 76 70 86 Z" fill="url(#cap)"/>
    <text x="110" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="13" fill="#0D9488">✦</text>
  </g>
</svg>
