<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="Servia pest control">
  <defs>
    <radialGradient id="bg" cx="0.45" cy="0.4" r="0.7"><stop offset="0%" stop-color="#FB7185"/><stop offset="60%" stop-color="#E11D48"/><stop offset="100%" stop-color="#881337"/></radialGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#FB7185" stop-opacity="0.55"/><stop offset="100%" stop-color="#FB7185" stop-opacity="0"/></radialGradient>
    <radialGradient id="face" cx="0.45" cy="0.4" r="0.65"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FCD34D"/></radialGradient>
  </defs>
  <circle cx="110" cy="110" r="100" fill="url(#bg)"/>
  <ellipse cx="86" cy="68" rx="56" ry="30" fill="#fff" opacity="0.10"/>
  <!-- bug being chased away (top right) -->
  <text x="180" y="50" font-size="18">🪲<animate attributeName="x" values="180;200;180" dur="3s" repeatCount="indefinite"/></text>
  <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.6s" repeatCount="indefinite"/>
    <!-- spray gun (right) -->
    <g transform="translate(166 130)">
      <animateTransform attributeName="transform" type="rotate" values="-15 0 0; 5 0 0; -15 0 0" dur="2s" repeatCount="indefinite" additive="sum"/>
      <rect x="-10" y="-6" width="22" height="14" rx="2" fill="#94A3B8"/>
      <rect x="-2" y="8" width="6" height="14" fill="#475569"/>
      <rect x="12" y="-3" width="14" height="6" rx="2" fill="#94A3B8"/>
      <!-- spray cloud -->
      <circle cx="32" cy="-2" r="3" fill="#A7F3D0" opacity="0.7"><animate attributeName="r" values="3;6;3" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="36" cy="2" r="2" fill="#A7F3D0" opacity="0.5"><animate attributeName="r" values="2;5;2" dur="1.6s" begin="0.3s" repeatCount="indefinite"/></circle>
    </g>
    <!-- shield (left) -->
    <g transform="translate(46 132)">
      <path d="M0 -16 L14 -10 L14 4 Q14 14 0 22 Q-14 14 -14 4 L-14 -10 Z" fill="#FFFFFF"/>
      <path d="M0 -10 L8 -6 L8 4 Q8 10 0 16 Q-8 10 -8 4 L-8 -6 Z" fill="#22C55E"/>
      <text x="0" y="6" text-anchor="middle" font-size="11" fill="#FFFFFF">✓</text>
    </g>
    <path d="M60 198 Q60 142 110 142 Q160 142 160 198 Z" fill="#FFFFFF"/>
    <rect x="96" y="158" width="28" height="14" rx="4" fill="#E11D48"/>
    <text x="110" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="9" fill="#FFFFFF">SERVIA</text>
    <circle cx="110" cy="100" r="42" fill="url(#face)"/>
    <ellipse cx="84" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="136" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="93" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <ellipse cx="127" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <circle cx="95" cy="97" r="2" fill="#FFFFFF"/>
    <circle cx="129" cy="97" r="2" fill="#FFFFFF"/>
    <path d="M92 122 Q110 138 128 122" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- mask + cap -->
    <path d="M70 86 Q70 56 110 56 Q150 56 150 86" fill="#22C55E"/>
    <text x="110" y="78" text-anchor="middle" font-size="13" fill="#FFFFFF">🛡</text>
  </g>
</svg>
