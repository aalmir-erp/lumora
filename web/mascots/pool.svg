<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="Servia pool service">
  <defs>
    <radialGradient id="bg" cx="0.45" cy="0.4" r="0.7"><stop offset="0%" stop-color="#22D3EE"/><stop offset="60%" stop-color="#0891B2"/><stop offset="100%" stop-color="#155E75"/></radialGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#FB7185" stop-opacity="0.55"/><stop offset="100%" stop-color="#FB7185" stop-opacity="0"/></radialGradient>
    <radialGradient id="face" cx="0.45" cy="0.4" r="0.65"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FCD34D"/></radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F87171"/><stop offset="100%" stop-color="#DC2626"/></linearGradient>
  </defs>
  <circle cx="110" cy="110" r="100" fill="url(#bg)"/>
  <!-- water ripples -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M20 170 Q60 158 100 170 T180 170"><animate attributeName="d" values="M20 170 Q60 158 100 170 T180 170;M20 170 Q60 178 100 170 T180 170;M20 170 Q60 158 100 170 T180 170" dur="3s" repeatCount="indefinite"/></path>
    <path d="M20 184 Q60 172 100 184 T180 184"><animate attributeName="d" values="M20 184 Q60 172 100 184 T180 184;M20 184 Q60 192 100 184 T180 184;M20 184 Q60 172 100 184 T180 184" dur="3.4s" repeatCount="indefinite"/></path>
  </g>
  <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" repeatCount="indefinite"/>
    <!-- life ring on right -->
    <g transform="translate(168 132)">
      <circle cx="0" cy="0" r="18" fill="url(#ring)"/>
      <circle cx="0" cy="0" r="9" fill="#FFFFFF"/>
      <rect x="-2" y="-20" width="4" height="10" fill="#F87171"/>
      <rect x="-2" y="10" width="4" height="10" fill="#F87171"/>
      <rect x="-20" y="-2" width="10" height="4" fill="#F87171"/>
      <rect x="10" y="-2" width="10" height="4" fill="#F87171"/>
    </g>
    <!-- pool net (left) -->
    <g transform="translate(50 130) rotate(-20)">
      <rect x="-2" y="0" width="4" height="40" fill="#92400E" rx="2"/>
      <ellipse cx="0" cy="-6" rx="14" ry="6" fill="none" stroke="#94A3B8" stroke-width="2"/>
      <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#94A3B8" stroke-width="0.5"/>
    </g>
    <path d="M60 198 Q60 142 110 142 Q160 142 160 198 Z" fill="#FFFFFF"/>
    <rect x="96" y="158" width="28" height="14" rx="4" fill="#0891B2"/>
    <text x="110" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="9" fill="#FFFFFF">SERVIA</text>
    <circle cx="110" cy="100" r="42" fill="url(#face)"/>
    <ellipse cx="84" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="136" cy="115" rx="10" ry="7" fill="url(#cheek)"/>
    <ellipse cx="93" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <ellipse cx="127" cy="100" rx="6" ry="7.5" fill="#0F172A"><animate attributeName="ry" values="7.5;7.5;0.6;7.5;7.5" dur="4.5s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/></ellipse>
    <circle cx="95" cy="97" r="2" fill="#FFFFFF"/>
    <circle cx="129" cy="97" r="2" fill="#FFFFFF"/>
    <path d="M92 122 Q110 138 128 122" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- swimmer cap -->
    <path d="M70 90 Q70 56 110 56 Q150 56 150 90" fill="#0EA5E9" stroke="#0284C7" stroke-width="1.5"/>
    <text x="110" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="13" fill="#FFFFFF">🏊</text>
  </g>
</svg>
