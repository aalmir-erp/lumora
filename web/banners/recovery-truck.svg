<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Servia 24/7 vehicle recovery in UAE">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="headlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FEF3C7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky / desert backdrop -->
  <rect width="1200" height="430" fill="url(#sky)"/>
  <!-- Moon -->
  <circle cx="1020" cy="120" r="38" fill="#FEF3C7" opacity="0.85"/>
  <!-- Stars -->
  <g fill="#fff">
    <circle cx="180" cy="80"  r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="50"  r="1"><animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="100" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="60"  r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="130" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Dunes silhouette -->
  <path d="M0,430 Q200,360 400,400 T800,410 T1200,390 L1200,430 Z" fill="#0F172A" opacity="0.5"/>

  <!-- Road -->
  <rect y="430" width="1200" height="200" fill="url(#ground)"/>
  <!-- Lane markings (animated leftward to give motion sense) -->
  <g fill="#F59E0B">
    <g>
      <rect x="0"   y="525" width="100" height="6" rx="3"/>
      <rect x="200" y="525" width="100" height="6" rx="3"/>
      <rect x="400" y="525" width="100" height="6" rx="3"/>
      <rect x="600" y="525" width="100" height="6" rx="3"/>
      <rect x="800" y="525" width="100" height="6" rx="3"/>
      <rect x="1000" y="525" width="100" height="6" rx="3"/>
      <rect x="1200" y="525" width="100" height="6" rx="3"/>
      <animateTransform attributeName="transform" type="translate"
                        from="0,0" to="-200,0" dur="0.8s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Tow truck (animated) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="-400,0; 0,0; 0,0; 1300,0"
                      keyTimes="0; 0.3; 0.85; 1"
                      dur="6s" repeatCount="indefinite"/>
    <!-- subtle bob -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 0,-2; 0,0; 0,2; 0,0"
                        dur="0.4s" repeatCount="indefinite"/>

      <!-- Towed sedan being lifted -->
      <g transform="translate(180,390)">
        <rect x="0" y="20" width="180" height="60" rx="10" fill="#0EA5E9"/>
        <rect x="20" y="0" width="140" height="30" rx="6" fill="#0284C7"/>
        <rect x="35" y="6" width="50" height="20" fill="#BAE6FD" opacity="0.8"/>
        <rect x="95" y="6" width="50" height="20" fill="#BAE6FD" opacity="0.8"/>
        <circle cx="40"  cy="86" r="18" fill="#111827"/>
        <circle cx="40"  cy="86" r="7"  fill="#6B7280"/>
        <circle cx="140" cy="86" r="18" fill="#111827"/>
        <circle cx="140" cy="86" r="7"  fill="#6B7280"/>
      </g>
      <!-- Tow truck cab + bed -->
      <g transform="translate(370,330)">
        <!-- Flatbed ramp going to sedan -->
        <path d="M0,150 L-180,140 L-180,160 L0,170 Z" fill="#1E293B"/>
        <!-- Flatbed -->
        <rect x="0" y="100" width="220" height="60" rx="6" fill="#334155"/>
        <!-- Cab -->
        <rect x="220" y="40" width="140" height="120" rx="10" fill="#0F766E"/>
        <rect x="240" y="60" width="100" height="50" rx="6" fill="#BAE6FD" opacity="0.9"/>
        <!-- Cab door + handle -->
        <rect x="230" y="115" width="2" height="40" fill="#064E3B"/>
        <circle cx="262" cy="135" r="3" fill="#F59E0B"/>
        <!-- Servia badge on door -->
        <rect x="244" y="120" width="100" height="22" rx="11" fill="#fff"/>
        <text x="294" y="136" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" fill="#0F766E" text-anchor="middle">SERVIA</text>
        <!-- Roof light bar (flashing) -->
        <rect x="240" y="30" width="100" height="14" rx="4" fill="#1F2937"/>
        <rect x="246" y="32" width="20" height="10" rx="2" fill="#EF4444">
          <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="290" y="32" width="20" height="10" rx="2" fill="#3B82F6">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="334" y="32" width="20" height="10" rx="2" fill="#EF4444">
          <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <!-- Wheels -->
        <circle cx="40"  cy="170" r="22" fill="#111827"/>
        <circle cx="40"  cy="170" r="8"  fill="#6B7280"/>
        <circle cx="170" cy="170" r="22" fill="#111827"/>
        <circle cx="170" cy="170" r="8"  fill="#6B7280"/>
        <circle cx="300" cy="170" r="22" fill="#111827"/>
        <circle cx="300" cy="170" r="8"  fill="#6B7280"/>
        <!-- Headlights cone -->
        <ellipse cx="380" cy="120" rx="60" ry="14" fill="url(#headlight)"/>
        <circle cx="358" cy="118" r="6" fill="#FEF3C7"/>
      </g>
    </g>
  </g>

  <!-- Headline + CTA overlay -->
  <g>
    <rect x="60" y="40" width="540" height="120" rx="16" fill="#fff" opacity="0.95"/>
    <text x="80" y="92" font-family="Segoe UI,Arial,sans-serif" font-size="44" font-weight="900" fill="#0F172A">
      24/7 Vehicle Recovery
    </text>
    <text x="80" y="138" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#475569">
      All 7 emirates · arrives in 30 min · flat AED 250
    </text>
    <!-- CTA pill -->
    <g>
      <rect x="60" y="480" width="280" height="60" rx="30" fill="#F59E0B"/>
      <text x="200" y="520" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="800" fill="#0F172A" text-anchor="middle">
        Book in 60s →
      </text>
      <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
