<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Servia AC service and cleaning in UAE">
  <defs>
    <linearGradient id="bgAC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgAC)"/>

  <!-- Sun (top-right, indicating heat outside) -->
  <g transform="translate(1080,120)">
    <circle r="48" fill="#F59E0B"/>
    <g stroke="#F59E0B" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <line x1="0" y1="-70" x2="0" y2="-58"/>
      <line x1="0" y1="58"  x2="0" y2="70"/>
      <line x1="-70" y1="0" x2="-58" y2="0"/>
      <line x1="58"  y1="0" x2="70"  y2="0"/>
      <line x1="-50" y1="-50" x2="-41" y2="-41"/>
      <line x1="50"  y1="50"  x2="41"  y2="41"/>
      <line x1="-50" y1="50"  x2="-41" y2="41"/>
      <line x1="50"  y1="-50" x2="41"  y2="-41"/>
    </g>
  </g>

  <!-- AC unit (centered-right) -->
  <g transform="translate(740,240)">
    <!-- Wall outline -->
    <rect x="-30" y="-30" width="400" height="240" rx="6" fill="#F1F5F9" opacity="0.08"/>
    <!-- AC body -->
    <rect x="0" y="0" width="340" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="0" y="0" width="340" height="120" rx="14" fill="none" stroke="#0F766E" stroke-width="2"/>
    <!-- Brand stripe -->
    <rect x="14" y="14" width="60" height="18" rx="9" fill="#0F766E"/>
    <text x="44" y="28" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" fill="#fff">SERVIA</text>
    <!-- Louvers -->
    <g fill="#CBD5E1">
      <rect x="14" y="56"  width="312" height="6" rx="3"/>
      <rect x="14" y="72"  width="312" height="6" rx="3"/>
      <rect x="14" y="88"  width="312" height="6" rx="3"/>
      <rect x="14" y="104" width="312" height="4" rx="2"/>
    </g>
    <!-- Display panel -->
    <rect x="260" y="14" width="66" height="34" rx="6" fill="#0F172A"/>
    <text x="293" y="38" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="18" font-weight="700" fill="#22D3EE">
      22°
    </text>

    <!-- Cool-air waves (animated) -->
    <g fill="none" stroke="#BAE6FD" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <path d="M40,140 Q100,170 60,200 Q20,230 80,260">
        <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" repeatCount="indefinite"/>
      </path>
      <path d="M160,140 Q220,170 180,200 Q140,230 200,260">
        <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M280,140 Q340,170 300,200 Q260,230 320,260">
        <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Snowflakes (drift) -->
    <g fill="#fff">
      <text x="80" y="240" font-size="22" opacity="0.85">❄
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;0" dur="3s" repeatCount="indefinite"/>
      </text>
      <text x="200" y="220" font-size="20" opacity="0.85">❄
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;0" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
      </text>
      <text x="300" y="230" font-size="24" opacity="0.85">❄
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,46" dur="3.2s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;0" dur="3.2s" begin="1.2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Headline + CTA overlay -->
  <g>
    <text x="80" y="180" font-family="Segoe UI,Arial,sans-serif" font-size="62" font-weight="900" fill="#FFFFFF">
      AC Cleaning &amp; Service
    </text>
    <text x="80" y="232" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#FEF3C7">
      Before summer hits — save up to 30% energy
    </text>
    <text x="80" y="274" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="500" fill="#fff" opacity="0.95">
      Full deep clean · gas top-up · same-day repair · all 7 emirates
    </text>
    <g>
      <rect x="80" y="430" width="320" height="68" rx="34" fill="#F59E0B"/>
      <text x="240" y="474" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#0F172A" text-anchor="middle">
        Book in 60s →
      </text>
      <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
