<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Servia laptop repair at your door in UAE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circuit pattern -->
  <g stroke="#10B981" stroke-width="1" fill="none" opacity="0.18">
    <path d="M0,500 L200,500 L200,400 L400,400 L400,520 L600,520"/>
    <path d="M1200,80 L1000,80 L1000,180 L820,180 L820,60"/>
    <circle cx="200" cy="400" r="4" fill="#10B981"/>
    <circle cx="400" cy="520" r="4" fill="#10B981"/>
    <circle cx="820" cy="180" r="4" fill="#10B981"/>
  </g>

  <!-- Laptop centered-right -->
  <g transform="translate(720,180)">
    <!-- Screen (animated tilt to mimic 'opening') -->
    <g transform-origin="200 280">
      <animateTransform attributeName="transform" type="rotate"
                        values="-3;3;-3" dur="6s" repeatCount="indefinite"/>
      <!-- Screen body -->
      <rect x="40" y="0" width="320" height="200" rx="10" fill="#334155"/>
      <rect x="50" y="10" width="300" height="180" rx="4" fill="url(#screen)"/>
      <!-- Code lines on screen (pulse) -->
      <g fill="#22D3EE" opacity="0.85">
        <rect x="64" y="30"  width="180" height="6" rx="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></rect>
        <rect x="64" y="46"  width="120" height="6" rx="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></rect>
        <rect x="64" y="62"  width="240" height="6" rx="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></rect>
        <rect x="64" y="78"  width="160" height="6" rx="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
        <rect x="64" y="94"  width="200" height="6" rx="3"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></rect>
        <rect x="64" y="110" width="140" height="6" rx="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></rect>
      </g>
      <!-- Spinning checkmark badge (the 'diagnostic complete' loop) -->
      <g transform="translate(280,140)">
        <circle r="36" fill="#0F766E" stroke="#10B981" stroke-width="3" stroke-dasharray="180 60">
          <animateTransform attributeName="transform" type="rotate"
                            from="0" to="360" dur="3s" repeatCount="indefinite"/>
        </circle>
        <path d="M-14,-2 L-4,10 L14,-12" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    <!-- Keyboard base -->
    <rect x="0" y="200" width="400" height="22" rx="4" fill="#475569"/>
    <ellipse cx="200" cy="222" rx="160" ry="5" fill="#000" opacity="0.2"/>
  </g>

  <!-- Spinning gear behind laptop (left) — service icon -->
  <g transform="translate(220,300)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="8s" repeatCount="indefinite"/>
      <path d="M0,-80 L18,-72 L18,-60 L40,-50 L52,-58 L66,-44 L58,-30 L68,-12 L80,-10 L80,16 L68,18 L58,36 L66,52 L52,66 L40,58 L18,68 L18,80 L-18,80 L-18,68 L-40,58 L-52,66 L-66,52 L-58,36 L-68,18 L-80,16 L-80,-10 L-68,-12 L-58,-30 L-66,-44 L-52,-58 L-40,-50 L-18,-60 L-18,-72 Z"
            fill="#F59E0B" opacity="0.95"/>
      <circle r="28" fill="#0F766E"/>
      <circle r="14" fill="#F59E0B"/>
    </g>
  </g>

  <!-- Headline / CTA overlay (top-left) -->
  <g>
    <text x="80" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">
      Laptop Repair
    </text>
    <text x="80" y="166" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#A7F3D0">
      at your door · same day
    </text>
    <text x="80" y="208" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="500" fill="#D1FAE5">
      All brands · screen, battery, motherboard · 90-day warranty
    </text>
    <!-- CTA pill -->
    <g>
      <rect x="80" y="480" width="320" height="68" rx="34" fill="#F59E0B"/>
      <text x="240" y="524" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#0F172A" text-anchor="middle">
        Book in 60s →
      </text>
      <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
