<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Servia mobile phone screen + battery repair in UAE">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Floating sparkles -->
  <g fill="#FEF3C7">
    <circle cx="200" cy="160" r="3"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="100" r="2"><animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="200" r="3"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="120" r="2"><animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="540" r="3"><animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- The phone (right side) with crack → heal loop -->
  <g transform="translate(820,90)">
    <!-- Glow halo when 'healing' -->
    <circle cx="120" cy="220" r="200" fill="#FEF3C7" opacity="0">
      <animate attributeName="opacity" values="0;0;0.35;0" keyTimes="0;0.7;0.85;1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Phone body -->
    <rect x="20" y="20" width="220" height="420" rx="32" fill="#0F172A"/>
    <rect x="32" y="34" width="196" height="392" rx="24" fill="url(#phoneScreen)"/>
    <!-- Speaker -->
    <rect x="100" y="48" width="60" height="6" rx="3" fill="#0F172A"/>
    <!-- Cracks (fade in/out) -->
    <g stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.9;0.0;0.0;0.9" keyTimes="0;0.55;0.8;0.95;1" dur="5s" repeatCount="indefinite"/>
      <path d="M70,140 L130,200 L100,260 L160,300 L120,360"/>
      <path d="M130,200 L80,220"/>
      <path d="M100,260 L60,280"/>
      <path d="M160,300 L200,320"/>
      <path d="M120,360 L80,400"/>
    </g>
    <!-- App-icon grid (shows after healing) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.55;0.8;0.95;1" dur="5s" repeatCount="indefinite"/>
      <rect x="58" y="110" width="42" height="42" rx="10" fill="#F59E0B"/>
      <rect x="110" y="110" width="42" height="42" rx="10" fill="#EF4444"/>
      <rect x="162" y="110" width="42" height="42" rx="10" fill="#A78BFA"/>
      <rect x="58" y="162" width="42" height="42" rx="10" fill="#22C55E"/>
      <rect x="110" y="162" width="42" height="42" rx="10" fill="#F472B6"/>
      <rect x="162" y="162" width="42" height="42" rx="10" fill="#60A5FA"/>
      <rect x="58" y="214" width="42" height="42" rx="10" fill="#FB923C"/>
      <rect x="110" y="214" width="42" height="42" rx="10" fill="#34D399"/>
      <rect x="162" y="214" width="42" height="42" rx="10" fill="#FBBF24"/>
    </g>
    <!-- Home indicator -->
    <rect x="100" y="410" width="60" height="5" rx="2.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Tools floating animation -->
  <g transform="translate(640,300)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="-15;15;-15" dur="3.5s" repeatCount="indefinite"/>
      <!-- Screwdriver -->
      <rect x="-6" y="-50" width="12" height="60" rx="2" fill="#9CA3AF"/>
      <rect x="-10" y="10" width="20" height="40" rx="6" fill="#F59E0B"/>
    </g>
  </g>

  <!-- Headline / CTA overlay (left) -->
  <g>
    <text x="80" y="200" font-family="Segoe UI,Arial,sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">
      Mobile Repair
    </text>
    <text x="80" y="252" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#FEF3C7">
      Screen · battery · charging port
    </text>
    <text x="80" y="292" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="500" fill="#fff" opacity="0.92">
      Pickup &amp; delivery across UAE · 45-min fix
    </text>
    <g>
      <rect x="80" y="430" width="300" height="68" rx="34" fill="#F59E0B"/>
      <text x="230" y="474" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#0F172A" text-anchor="middle">
        Book in 60s →
      </text>
      <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
