<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Servia plumbing emergency in UAE">
  <defs>
    <linearGradient id="bgPlumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgPlumb)"/>

  <!-- Animated water drops on left -->
  <g fill="#22D3EE">
    <path d="M0,0 C-12,-20 -12,-32 0,-50 C12,-32 12,-20 0,0 Z" transform="translate(160,0)">
      <animateTransform attributeName="transform" type="translate"
                        values="160,-30;160,300;160,300" keyTimes="0;0.7;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.65;1" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 C-12,-20 -12,-32 0,-50 C12,-32 12,-20 0,0 Z" transform="translate(160,0)">
      <animateTransform attributeName="transform" type="translate"
                        values="160,-30;160,300;160,300" keyTimes="0;0.7;1" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.65;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M0,0 C-12,-20 -12,-32 0,-50 C12,-32 12,-20 0,0 Z" transform="translate(160,0)">
      <animateTransform attributeName="transform" type="translate"
                        values="160,-30;160,300;160,300" keyTimes="0;0.7;1" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.65;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Splash ripples at impact zone -->
  <g fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7">
    <circle cx="160" cy="300" r="10">
      <animate attributeName="r" values="0;60" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="300" r="10">
      <animate attributeName="r" values="0;60" dur="3s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wrench rotating -->
  <g transform="translate(900,300)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-30;30;-30" dur="2.4s" repeatCount="indefinite"/>
      <!-- Handle -->
      <rect x="-180" y="-14" width="260" height="28" rx="14" fill="#94A3B8"/>
      <rect x="-180" y="-14" width="260" height="14" rx="7" fill="#CBD5E1"/>
      <!-- Jaw head -->
      <g transform="translate(90,0)">
        <circle r="40" fill="#94A3B8"/>
        <path d="M-32,-22 L28,-22 L28,-10 L-2,-10 L-2,10 L28,10 L28,22 L-32,22 Z" fill="#0F172A"/>
        <circle r="40" fill="none" stroke="#475569" stroke-width="4"/>
      </g>
      <!-- End grip -->
      <circle cx="-180" cy="0" r="20" fill="#475569"/>
      <circle cx="-180" cy="0" r="10" fill="#0F172A"/>
    </g>
  </g>

  <!-- Pipe (vertical, right side) -->
  <g transform="translate(820,0)">
    <rect x="0" y="0" width="40" height="630" fill="#64748B"/>
    <rect x="0" y="0" width="40" height="630" fill="url(#bgPlumb)" opacity="0.3"/>
    <rect x="-6" y="240" width="52" height="30" rx="4" fill="#475569"/>
    <rect x="-6" y="440" width="52" height="30" rx="4" fill="#475569"/>
    <!-- Highlight stripe -->
    <rect x="8" y="0" width="6" height="630" fill="#CBD5E1" opacity="0.6"/>
  </g>

  <!-- Headline + CTA overlay -->
  <g>
    <text x="80" y="180" font-family="Segoe UI,Arial,sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">
      Plumbing Emergency
    </text>
    <text x="80" y="232" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#FEF3C7">
      Leak fix in 30 minutes · 24/7
    </text>
    <text x="80" y="274" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="500" fill="#fff" opacity="0.95">
      Burst pipes · blocked drains · water-heater · all emirates
    </text>
    <g>
      <rect x="80" y="430" width="320" height="68" rx="34" fill="#F59E0B"/>
      <text x="240" y="474" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800" fill="#0F172A" text-anchor="middle">
        Book in 60s →
      </text>
      <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
