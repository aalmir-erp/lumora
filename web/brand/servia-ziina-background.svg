<?xml version="1.0" encoding="UTF-8"?>
<!--
  Servia payment-link header background for Ziina.
  Wide 1500×500 — fits Ziina's gradient header behind the avatar +
  invoice card. Designed so the centred avatar sits on a clean area
  and the wordmark + 7-emirate strap sit safely off to the side.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="Servia — UAE home services">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0F766E"/>
      <stop offset="0.55" stop-color="#0D9488"/>
      <stop offset="1"   stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#F59E0B"/>
      <stop offset="1"   stop-color="#FCD34D"/>
    </linearGradient>
  </defs>

  <!-- Main gradient -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Centre highlight (so the avatar that Ziina drops on top reads cleanly) -->
  <rect width="1500" height="500" fill="url(#spotlight)"/>

  <!-- Decorative geometric shapes — soft, brand-safe, no UAE clichés -->
  <g opacity="0.10" fill="#FFFFFF">
    <circle cx="120"  cy="80"  r="38"/>
    <circle cx="1380" cy="120" r="58"/>
    <circle cx="240"  cy="430" r="22"/>
    <circle cx="1280" cy="420" r="34"/>
    <path d="M 1430,30 L 1470,30 L 1450,70 Z"/>
    <path d="M 60,420 L 100,420 L 80,460 Z"/>
  </g>

  <!-- Wordmark + strap (lower-left so it doesn't fight the centred avatar) -->
  <g transform="translate(60, 70)">
    <text x="0" y="0"
          font-family="Segoe UI, system-ui, -apple-system, Arial, sans-serif"
          font-size="62" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      Servia
    </text>
    <text x="0" y="38"
          font-family="Segoe UI, system-ui, -apple-system, Arial, sans-serif"
          font-size="14.5" font-weight="700" fill="#A7F3D0" letter-spacing="3">
      UAE HOME SERVICES · ALL 7 EMIRATES
    </text>
  </g>

  <!-- Bottom-right tag: trust + reach -->
  <g transform="translate(1440, 440)" text-anchor="end">
    <text x="0" y="0"
          font-family="Segoe UI, system-ui, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF" opacity="0.85" letter-spacing="2">
      pay.ziina.me/servia
    </text>
  </g>

  <!-- UAE flag accent at the very bottom — small, tasteful -->
  <g transform="translate(0, 488)">
    <rect width="375"  height="12" fill="#00732F"/>
    <rect x="375"  width="375" height="12" fill="#FFFFFF"/>
    <rect x="750"  width="375" height="12" fill="#000000"/>
    <rect x="1125" width="375" height="12" fill="#FF0000"/>
  </g>

  <!-- Thin gold rule above the flag — separates the brand area from the
       payment-card UI Ziina renders on top -->
  <rect y="476" width="1500" height="4" fill="url(#goldBar)"/>
</svg>
