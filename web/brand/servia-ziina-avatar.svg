<?xml version="1.0" encoding="UTF-8"?>
<!--
  Servia avatar for Ziina (and any other payment-link / profile slot).
  Square 1024×1024 — Ziina masks it to a circle automatically.
  Pure SVG → renders crisp at any size + safe for AI engines.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Servia">
  <defs>
    <!-- Servia brand gradient: deep teal → mint -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0F766E"/>
      <stop offset="0.6" stop-color="#0D9488"/>
      <stop offset="1"   stop-color="#14B8A6"/>
    </linearGradient>
    <!-- Soft inner glow so the avatar pops on dark Ziina backdrops -->
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.55">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full canvas background (Ziina will mask to circle) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Subtle highlight -->
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- UAE flag-strip subtle accent at the bottom (very low opacity so it
       reads as "trust UAE local" without screaming it) -->
  <g opacity="0.18">
    <rect y="1004" width="256"  height="20" fill="#00732F"/>
    <rect y="1004" x="256"  width="256" height="20" fill="#FFFFFF"/>
    <rect y="1004" x="512"  width="256" height="20" fill="#000000"/>
    <rect y="1004" x="768"  width="256" height="20" fill="#FF0000"/>
  </g>

  <!-- "S" mark — bold, geometric, readable down to 48px -->
  <g filter="url(#shadow)">
    <!-- Outer rounded rect for that "app-icon" feel -->
    <rect x="200" y="200" width="624" height="624" rx="140" fill="#FFFFFF" opacity="0.0"/>
    <!-- The S itself -->
    <path d="
      M 700,365
      C 660,310 580,290 510,290
      C 410,290 320,345 320,440
      C 320,520 380,560 480,580
      L 560,594
      C 620,604 650,624 650,664
      C 650,710 590,734 510,734
      C 430,734 360,706 320,650
      L 280,725
      C 340,790 420,820 510,820
      C 650,820 740,750 740,650
      C 740,560 670,520 560,500
      L 480,486
      C 430,478 410,460 410,432
      C 410,388 460,372 510,372
      C 580,372 630,400 660,440
      Z" fill="#FFFFFF"/>
  </g>

  <!-- Tiny mint dot underneath the S — a brand callback that the wordmark uses -->
  <circle cx="512" cy="884" r="22" fill="#FCD34D"/>
</svg>
