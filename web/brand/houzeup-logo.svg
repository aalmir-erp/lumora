<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="HouzeUp logo">
  <defs>
    <linearGradient id="hz-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F766E"/>
      <stop offset="55%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="hz-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- ICON: rounded square with stylised house + up-arrow + spark -->
  <g>
    <rect x="6" y="6" width="68" height="68" rx="18" fill="url(#hz-grad)"/>
    <!-- subtle inner highlight -->
    <rect x="10" y="10" width="60" height="22" rx="14" fill="#fff" opacity="0.10"/>

    <!-- house silhouette -->
    <path d="M22 50 L40 32 L58 50 L58 60 Q58 62 56 62 L24 62 Q22 62 22 60 Z"
          fill="#FFFFFF" opacity="0.96"/>
    <!-- roof accent (gold) -->
    <path d="M22 50 L40 32 L58 50 L52 50 L40 38 L28 50 Z" fill="url(#hz-roof)"/>
    <!-- door -->
    <rect x="36" y="50" width="8" height="12" rx="1.5" fill="#0F766E"/>
    <!-- up-arrow inside chimney area -->
    <g transform="translate(48 24)">
      <path d="M0 8 L0 -4 M-4 0 L0 -4 L4 0" stroke="#FFFFFF" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- twinkle -->
    <g transform="translate(60 18)">
      <path d="M0 -5 L1.4 -1.4 L5 0 L1.4 1.4 L0 5 L-1.4 1.4 L-5 0 L-1.4 -1.4 Z"
            fill="#FCD34D"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="800" letter-spacing="-0.5">
    <text x="92" y="50" font-size="34" fill="#0F172A">Houze</text>
    <text x="219" y="50" font-size="34" fill="#0F766E">Up</text>
    <!-- arrow swoosh under "Up" -->
    <path d="M214 56 Q248 64 286 50" stroke="url(#hz-grad)" stroke-width="3"
          stroke-linecap="round" fill="none"/>
    <text x="92" y="68" font-size="11" font-weight="600" letter-spacing="2"
          fill="#475569">UAE HOME SERVICES · 60-SEC BOOKING</text>
  </g>
</svg>
