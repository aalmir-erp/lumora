<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<title>Resetting Servia · please wait</title>
<style>
  body{margin:0;font:16px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:#0F766E;color:#fff;display:flex;align-items:center;justify-content:center;
       min-height:100vh;padding:20px;text-align:center}
  .card{max-width:420px}
  h1{font-size:28px;margin:0 0 8px}
  p{color:#A7F3D0;margin:0 0 14px}
  .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#FCD34D;
           border-radius:50%;animation:spin 0.8s linear infinite;margin:18px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  #status{font-size:13px;color:#FCD34D;font-family:monospace;margin-top:14px;line-height:1.7}
  #manual{display:none;margin-top:14px;font-size:13px}
  #manual a{background:#FCD34D;color:#7C2D12;padding:10px 18px;border-radius:999px;
            text-decoration:none;font-weight:800;display:inline-block;margin-top:10px}
</style>
</head><body>
<div class="card">
  <h1>🔧 Resetting Servia</h1>
  <p>Clearing cached files so you get the latest version. Takes ~5 seconds.</p>
  <div class="spinner"></div>
  <pre id="status">starting…</pre>
  <div id="manual">
    Reset hung. Click below to force-reload:<br>
    <a href="/?nocache=1">Open Servia →</a>
  </div>
</div>
<script>
(async function(){
  const log = (m) => { document.getElementById("status").textContent += "\n" + m; };
  try {
    log("✓ unregistering service worker");
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) {
        try { r.active && r.active.postMessage({type:"servia-reset"}); } catch(_){}
        await r.unregister();
      }
      log("✓ " + regs.length + " worker(s) unregistered");
    }
    log("✓ clearing caches");
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      log("✓ " + keys.length + " cache(s) deleted");
    }
    log("✓ clearing sessionStorage");
    try { sessionStorage.clear(); } catch(_){}
    log("✓ done — redirecting…");
    setTimeout(() => { location.href = "/?nocache=" + Date.now(); }, 800);
  } catch (e) {
    log("⚠ " + e.message);
    document.getElementById("manual").style.display = "block";
  }
})();
// Fallback: if reset hangs >7s, show manual button
setTimeout(() => {
  if (document.querySelector(".spinner")) {
    document.getElementById("manual").style.display = "block";
  }
}, 7000);
</script>
</body></html>
