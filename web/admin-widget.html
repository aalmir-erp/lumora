<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0F766E">
<meta name="robots" content="noindex,nofollow">
<title>Servia · Live</title>
<link rel="icon" type="image/svg+xml" href="/icon-192.svg">
<link rel="manifest" href="/manifest.webmanifest">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#0F172A;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden}
  .w-card{padding:18px;height:100vh;display:flex;flex-direction:column;gap:14px}
  .w-head{display:flex;justify-content:space-between;align-items:center}
  .w-head .title{font-size:11px;font-weight:800;letter-spacing:.08em;
    text-transform:uppercase;opacity:.85}
  .w-head .pulse{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#22C55E}
  .w-head .pulse::before{content:"";width:8px;height:8px;border-radius:50%;background:#22C55E;
    box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:p 1.4s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 14px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .w-now{font-size:64px;font-weight:900;letter-spacing:-.04em;line-height:.9;
    background:linear-gradient(135deg,#22C55E,#FCD34D);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .w-now-lbl{font-size:12px;color:#94A3B8;font-weight:600;margin-top:-4px}
  .w-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto}
  .w-mini-card{background:rgba(255,255,255,.06);border-radius:10px;padding:8px 10px}
  .w-mini-card .v{font-size:18px;font-weight:800}
  .w-mini-card .l{font-size:10px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .w-recent{font-size:11.5px;color:#CBD5E1;line-height:1.5;background:rgba(255,255,255,.04);
    padding:8px 10px;border-radius:8px;border-left:2px solid #FCD34D;max-height:60px;overflow:hidden}
  .w-recent code{color:#FCD34D;background:rgba(252,211,77,.08);padding:1px 5px;border-radius:3px}
  .w-foot{font-size:10px;color:#64748B;text-align:center;margin-top:auto}
  a{color:inherit;text-decoration:none}
  .w-err{color:#FCA5A5;font-size:12px;text-align:center;padding:24px}
</style>
</head><body>
<div class="w-card">
  <div class="w-head">
    <div class="title">📡 Servia Live</div>
    <div class="pulse" id="pulse">live</div>
  </div>

  <div>
    <div class="w-now" id="now">—</div>
    <div class="w-now-lbl">visitors right now</div>
  </div>

  <div class="w-recent" id="recent">…</div>

  <div class="w-mini">
    <div class="w-mini-card"><div class="v" id="m-today">—</div><div class="l">Today</div></div>
    <div class="w-mini-card"><div class="v" id="m-week">—</div><div class="l">7 days</div></div>
  </div>

  <div class="w-foot">
    <a href="/admin.html#live">Tap to open admin →</a> · auto-refreshes every 20s
  </div>
</div>

<script>
const KEY = "lumora.admin.tok";
const TOK = localStorage.getItem(KEY) || "";
async function load() {
  if (!TOK) {
    document.querySelector(".w-card").innerHTML =
      '<div class="w-err">🔒 Sign in once at <a href="/admin-login.html" style="color:#FCD34D;text-decoration:underline">/admin-login.html</a> on this device, then add this widget to your home screen.</div>';
    return;
  }
  try {
    const [stats, vis] = await Promise.all([
      fetch("/api/admin/live/stats", {headers:{Authorization:"Bearer "+TOK}}).then(r=>r.json()),
      fetch("/api/admin/live/visitors?active_minutes=15", {headers:{Authorization:"Bearer "+TOK}}).then(r=>r.json()),
    ]);
    document.getElementById("now").textContent = stats.active_now || 0;
    document.getElementById("m-today").textContent = stats.today || 0;
    document.getElementById("m-week").textContent = stats.week || 0;
    const recent = (vis.active||[])[0];
    document.getElementById("recent").innerHTML = recent
      ? `${recent.device||""} ${recent.os||""} on <code>${recent.last_path||"/"}</code> · ${recent.country||"?"} · ${recent.seconds_ago||0}s ago`
      : "🌙 No active visitors. New ones trigger a push.";
  } catch (e) {
    document.querySelector(".w-card").innerHTML = `<div class="w-err">⚠ ${e.message}</div>`;
  }
}
load();
setInterval(load, 20000);
</script>
</body></html>
