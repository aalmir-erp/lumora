<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" role="img" aria-label="Servia UAE coverage map" style="max-width:100%;height:auto;display:block;background:#F0F9FF">
  <defs>
    <linearGradient id="srvBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/><stop offset="100%" stop-color="#F0FDFA"/>
    </linearGradient>
    <linearGradient id="emFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/><stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="emFillSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="livePulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="580" fill="url(#srvBg)"/>

  <!-- Gulf of Oman - east -->
  <text x="640" y="90" font-family="system-ui,sans-serif" font-size="11" fill="#0EA5E9" opacity="0.6">Arabian Gulf</text>
  <text x="720" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#0EA5E9" opacity="0.6">Gulf of Oman</text>
  <!-- Saudi Arabia label south -->
  <text x="200" y="540" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" opacity="0.7">↓ Saudi Arabia</text>
  <!-- Oman labels -->
  <text x="700" y="320" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" opacity="0.7">→ Oman</text>

  <!-- Approximate UAE outline path -->
  <g filter="url(#dropShadow)">
    <!-- Whole UAE as one polygon -->
    <path d="M 60 480
             L 70 380 L 100 320 L 140 290 L 200 280
             L 280 275 L 360 285 L 430 290
             L 480 275 L 530 240 L 560 200
             L 605 175 L 640 165
             L 670 145 L 685 110 L 700 75
             L 730 65 L 745 95 L 740 145
             L 720 180 L 700 220 L 690 270
             L 700 320 L 720 380 L 720 440
             L 700 480 L 660 510 L 590 520
             L 480 510 L 380 500 L 280 510 L 180 510 L 100 500
             Z"
          fill="url(#emFill)" opacity="0.7"
          stroke="#0F766E" stroke-width="2"/>
  </g>

  <!-- Emirate dots with labels (positioned approximately) -->
  <!-- Dubai -->
  <g class="em" data-em="dubai">
    <circle cx="500" cy="290" r="32" fill="#0F766E" opacity="0.95"/>
    <text x="500" y="295" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="13" fill="#fff">Dubai</text>
    <text x="500" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0F766E" font-weight="600">200+ areas</text>
  </g>
  <!-- Abu Dhabi (south-west, biggest) -->
  <g class="em" data-em="abu-dhabi">
    <circle cx="280" cy="380" r="38" fill="#0F766E" opacity="0.95"/>
    <text x="280" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="12" fill="#fff">Abu</text>
    <text x="280" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="12" fill="#fff">Dhabi</text>
    <text x="280" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0F766E" font-weight="600">80+ areas</text>
  </g>
  <!-- Sharjah (north of Dubai) -->
  <g class="em" data-em="sharjah">
    <circle cx="555" cy="240" r="26" fill="#0F766E" opacity="0.95"/>
    <text x="555" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="11" fill="#fff">Sharjah</text>
    <text x="555" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0F766E" font-weight="600">60+ areas</text>
  </g>
  <!-- Ajman (between Sharjah and UAQ) -->
  <g class="em" data-em="ajman">
    <circle cx="595" cy="200" r="20" fill="#0F766E" opacity="0.95"/>
    <text x="595" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="10" fill="#fff">Ajman</text>
  </g>
  <!-- Umm Al Quwain -->
  <g class="em" data-em="umm-al-quwain">
    <circle cx="640" cy="170" r="18" fill="url(#emFillSoft)" opacity="0.95"/>
    <text x="640" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="9" fill="#78350F">UAQ</text>
  </g>
  <!-- Ras Al Khaimah (top right) -->
  <g class="em" data-em="ras-al-khaimah">
    <circle cx="700" cy="115" r="22" fill="#0F766E" opacity="0.95"/>
    <text x="700" y="119" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="10" fill="#fff">RAK</text>
  </g>
  <!-- Fujairah (east coast) -->
  <g class="em" data-em="fujairah">
    <circle cx="690" cy="300" r="22" fill="url(#emFillSoft)" opacity="0.95"/>
    <text x="690" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="10" fill="#78350F">Fujairah</text>
  </g>

  <!-- LIVE bookings (animated pulses on big emirates) -->
  <g>
    <circle cx="500" cy="290" r="28" fill="url(#livePulse)">
      <animate attributeName="r" values="0;42;0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="380" r="28" fill="url(#livePulse)">
      <animate attributeName="r" values="0;46;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="555" cy="240" r="22" fill="url(#livePulse)">
      <animate attributeName="r" values="0;36;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="595" cy="200" r="18" fill="url(#livePulse)">
      <animate attributeName="r" values="0;28;0" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="115" r="18" fill="url(#livePulse)">
      <animate attributeName="r" values="0;28;0" dur="3.4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="3.4s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Past job dots -->
  <g fill="#0F766E" opacity="0.4">
    <circle cx="490" cy="305" r="2"/><circle cx="510" cy="280" r="2"/>
    <circle cx="525" cy="295" r="2"/><circle cx="270" cy="370" r="2"/>
    <circle cx="295" cy="385" r="2"/><circle cx="305" cy="365" r="2"/>
    <circle cx="260" cy="395" r="2"/><circle cx="565" cy="245" r="2"/>
    <circle cx="540" cy="232" r="2"/><circle cx="600" cy="210" r="2"/>
    <circle cx="690" cy="120" r="2"/><circle cx="710" cy="105" r="2"/>
    <circle cx="200" cy="420" r="2"/><circle cx="160" cy="440" r="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40 30)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#fff" opacity="0.95" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="system-ui,sans-serif" font-weight="800" font-size="12" fill="#0F172A">SERVIA UAE LIVE COVERAGE</text>
    <circle cx="22" cy="42" r="5" fill="#22C55E"/>
    <text x="34" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Live booking right now</text>
    <circle cx="22" cy="62" r="5" fill="#0F766E" opacity="0.4"/>
    <text x="34" y="66" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Past completed jobs</text>
    <circle cx="22" cy="82" r="5" fill="url(#emFillSoft)"/>
    <text x="34" y="86" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Coming soon</text>
  </g>

  <!-- Stats -->
  <g transform="translate(540 470)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#fff" opacity="0.96" stroke="#E2E8F0"/>
    <text x="14" y="26" font-family="system-ui,sans-serif" font-weight="900" font-size="24" fill="#0F766E">2,412+</text>
    <text x="14" y="44" font-family="system-ui,sans-serif" font-size="11" fill="#475569">jobs completed UAE-wide</text>
    <text x="14" y="62" font-family="system-ui,sans-serif" font-size="11" fill="#22C55E" font-weight="700">●  5 live bookings right now</text>
  </g>
</svg>
