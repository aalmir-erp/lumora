<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Servia UAE coverage map" style="max-width:100%;height:auto;display:block">
  <defs>
    <linearGradient id="map-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/><stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="emirate-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="emirate-served" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#map-bg)" rx="14"/>
  <!-- Gulf water dots -->
  <g fill="#0EA5E9" opacity="0.18">
    <circle cx="150" cy="80" r="2"/><circle cx="220" cy="120" r="1.5"/>
    <circle cx="80" cy="220" r="2"/><circle cx="160" cy="280" r="1.5"/>
    <circle cx="60" cy="380" r="2"/><circle cx="120" cy="430" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/><circle cx="650" cy="60" r="2"/>
  </g>

  <!-- 7 emirates as rounded blob shapes (simplified, geographically suggestive) -->
  <!-- Abu Dhabi (largest, southwest) -->
  <g class="em" data-em="abu-dhabi">
    <path d="M170 230 Q140 240 130 280 Q110 360 170 430 Q260 470 380 460 Q500 450 540 400 Q560 350 540 300 Q510 270 460 270 Q400 268 360 250 Q280 220 220 220 Q190 220 170 230 Z"
          fill="url(#emirate-served)" stroke="#0F766E" stroke-width="2" opacity="0.92"/>
    <text x="320" y="370" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="20" fill="#fff">Abu Dhabi</text>
    <text x="320" y="392" text-anchor="middle" font-family="system-ui,sans-serif"
          font-size="11" fill="#fff" opacity="0.85">80+ areas served</text>
  </g>
  <!-- Dubai (central east, prominent) -->
  <g class="em" data-em="dubai">
    <path d="M460 200 Q500 195 540 215 Q580 235 590 270 Q580 300 540 305 Q500 305 470 290 Q440 270 445 240 Q450 215 460 200 Z"
          fill="url(#emirate-served)" stroke="#0F766E" stroke-width="2"/>
    <text x="515" y="255" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="18" fill="#fff">Dubai</text>
    <text x="515" y="275" text-anchor="middle" font-family="system-ui,sans-serif"
          font-size="10" fill="#fff" opacity="0.85">200+ areas</text>
  </g>
  <!-- Sharjah (above Dubai, hugging east coast too) -->
  <g class="em" data-em="sharjah">
    <path d="M540 145 Q580 135 620 150 Q650 175 645 215 Q620 220 590 215 Q560 205 545 180 Q530 160 540 145 Z"
          fill="url(#emirate-served)" stroke="#0F766E" stroke-width="2"/>
    <text x="595" y="185" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="14" fill="#fff">Sharjah</text>
    <text x="595" y="200" text-anchor="middle" font-family="system-ui,sans-serif"
          font-size="9" fill="#fff" opacity="0.85">60+ areas</text>
  </g>
  <!-- Ajman (small, between Sharjah and UAQ) -->
  <g class="em" data-em="ajman">
    <path d="M620 110 Q650 105 670 120 Q680 135 670 150 Q650 155 630 145 Q615 130 620 110 Z"
          fill="url(#emirate-served)" stroke="#0F766E" stroke-width="2"/>
    <text x="645" y="135" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="11" fill="#fff">Ajman</text>
  </g>
  <!-- Umm Al Quwain (small, northeast) -->
  <g class="em" data-em="umm-al-quwain">
    <path d="M680 90 Q705 85 720 100 Q725 115 715 130 Q695 135 680 125 Q670 110 680 90 Z"
          fill="url(#emirate-fill)" stroke="#92400E" stroke-width="2"/>
    <text x="697" y="115" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="9" fill="#92400E">UAQ</text>
  </g>
  <!-- Ras Al Khaimah (top right, mountains) -->
  <g class="em" data-em="ras-al-khaimah">
    <path d="M700 30 Q750 25 770 50 Q775 80 750 95 Q720 90 705 70 Q690 50 700 30 Z"
          fill="url(#emirate-served)" stroke="#0F766E" stroke-width="2"/>
    <text x="735" y="60" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="11" fill="#fff">RAK</text>
  </g>
  <!-- Fujairah (east coast, separated by mountains) -->
  <g class="em" data-em="fujairah">
    <path d="M650 220 Q685 230 695 270 Q700 320 680 360 Q650 360 640 320 Q635 270 650 220 Z"
          fill="url(#emirate-fill)" stroke="#92400E" stroke-width="2"/>
    <text x="668" y="290" text-anchor="middle" font-family="system-ui,sans-serif"
          font-weight="800" font-size="11" fill="#92400E">Fujairah</text>
  </g>

  <!-- LIVE booking pulses (animated dots showing 'right now' bookings) -->
  <g>
    <!-- Dubai Marina -->
    <circle cx="490" cy="265" r="22" fill="url(#pulse)">
      <animate attributeName="r" values="0;30;0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="265" r="5" fill="#22C55E"/>
    <!-- Abu Dhabi central -->
    <circle cx="320" cy="370" r="20" fill="url(#pulse)">
      <animate attributeName="r" values="0;28;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="370" r="5" fill="#22C55E"/>
    <!-- Sharjah Al Nahda -->
    <circle cx="595" cy="180" r="18" fill="url(#pulse)">
      <animate attributeName="r" values="0;26;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="595" cy="180" r="4" fill="#22C55E"/>
    <!-- Ajman Corniche -->
    <circle cx="645" cy="130" r="14" fill="url(#pulse)">
      <animate attributeName="r" values="0;20;0" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="645" cy="130" r="3" fill="#22C55E"/>
    <!-- RAK -->
    <circle cx="735" cy="58" r="14" fill="url(#pulse)">
      <animate attributeName="r" values="0;20;0" dur="3.2s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;0" dur="3.2s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="735" cy="58" r="3" fill="#22C55E"/>
  </g>

  <!-- Past-served faded dots -->
  <g fill="#0F766E" opacity="0.35">
    <circle cx="500" cy="240" r="2"/><circle cx="475" cy="280" r="2"/>
    <circle cx="540" cy="270" r="2"/><circle cx="290" cy="350" r="2"/>
    <circle cx="350" cy="380" r="2"/><circle cx="380" cy="350" r="2"/>
    <circle cx="270" cy="400" r="2"/><circle cx="610" cy="195" r="2"/>
    <circle cx="580" cy="195" r="2"/><circle cx="660" cy="135" r="2"/>
    <circle cx="725" cy="65" r="2"/><circle cx="710" cy="50" r="2"/>
    <circle cx="160" cy="380" r="2"/><circle cx="200" cy="420" r="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40 30)">
    <rect x="0" y="0" width="240" height="100" rx="10" fill="#fff" opacity="0.92" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="system-ui,sans-serif" font-weight="800" font-size="12" fill="#0F172A">SERVIA UAE LIVE COVERAGE</text>
    <circle cx="22" cy="42" r="5" fill="#22C55E"/>
    <text x="34" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Live booking right now</text>
    <circle cx="22" cy="62" r="5" fill="#0F766E" opacity="0.4"/>
    <text x="34" y="66" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Past completed jobs</text>
    <rect x="17" y="78" width="10" height="8" fill="url(#emirate-fill)" rx="1"/>
    <text x="34" y="86" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Coming soon</text>
  </g>

  <!-- Stats -->
  <g transform="translate(540 410)">
    <rect x="0" y="0" width="220" height="60" rx="10" fill="#fff" opacity="0.95" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="#0F766E">2,412+</text>
    <text x="14" y="38" font-family="system-ui,sans-serif" font-size="11" fill="#475569">jobs completed UAE-wide</text>
    <text x="14" y="54" font-family="system-ui,sans-serif" font-size="10" fill="#22C55E" font-weight="700">●  5 live bookings right now</text>
  </g>
</svg>
