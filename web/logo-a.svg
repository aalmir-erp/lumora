<?xml version="1.0" encoding="UTF-8"?>
<!-- Variant A — UAE flag mark + minimal wordmark flourish.
     'ia' in gold + kashida-style curl underneath (Arabic calligrapher's elongation
     stroke). Subtle 'Serv inshallah' nod that scales clean to favicon size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" role="img" aria-label="Servia logo">
  <defs>
    <clipPath id="lA-mark"><rect x="8" y="8" width="64" height="64" rx="14"/></clipPath>
    <radialGradient id="lA-disc" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#14B8A6"/><stop offset="60%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </radialGradient>
    <filter id="lA-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- UAE flag inside the rounded square mark -->
  <g clip-path="url(#lA-mark)">
    <rect x="8"  y="8"  width="16" height="64" fill="#EF3340"/>
    <rect x="24" y="8"  width="48" height="21.33" fill="#00732F"/>
    <rect x="24" y="29.33" width="48" height="21.33" fill="#FFFFFF"/>
    <rect x="24" y="50.67" width="48" height="21.33" fill="#000000"/>
  </g>
  <!-- Centered teal disc with stylised 'S' so the brand reads at any size -->
  <g filter="url(#lA-shadow)">
    <circle cx="40" cy="40" r="18" fill="url(#lA-disc)"/>
    <circle cx="40" cy="40" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-opacity="0.85"/>
  </g>
  <path d="M48 32 Q32 32 32 38 Q32 42 38 43 L42 44 Q48 45 48 48 Q48 52 36 52"
        stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Tiny gold sparkle (UAE-themed accent, top-right of the disc) -->
  <g fill="#FCD34D" transform="translate(56 26)">
    <circle cx="0" cy="0" r="2.4"/>
    <path d="M0 -6 v3 M0 4 v3 M-6 0 h3 M4 0 h3" stroke="#FCD34D" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: Serv (teal) + ia (gold) with kashida-style curl -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="800" letter-spacing="-0.5">
    <text x="92" y="50" font-size="38" fill="#0F766E">Serv</text>
    <text x="172" y="50" font-size="38" fill="#F59E0B">ia</text>
    <path d="M172 60 Q200 67 222 60 Q226 58 224 54" stroke="#F59E0B" stroke-width="2.6"
          stroke-linecap="round" fill="none"/>
    <text x="92" y="74" font-size="10" font-weight="600" letter-spacing="2.6"
          fill="#475569">YOUR UAE FIX-IT IN 60 SECONDS</text>
  </g>
</svg>
