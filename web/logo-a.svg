<?xml version="1.0" encoding="UTF-8"?>
<!-- Variant A — minimal: UAE-colour gradient mark (no literal flag stripes) +
     small Arabic 'إن شاء الله' tucked above 'ia' to depict 'ia = inshallah'. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 92" width="360" height="92" role="img" aria-label="Servia — service inshallah">
  <defs>
    <linearGradient id="lA-uae" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#EF3340"/>
      <stop offset="40%"  stop-color="#00732F"/>
      <stop offset="75%"  stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="lA-disc" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#14B8A6"/><stop offset="60%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </radialGradient>
    <filter id="lA-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- UAE-colour gradient mark -->
  <rect x="8" y="8" width="64" height="64" rx="14" fill="url(#lA-uae)"/>
  <!-- Centered teal disc with stylised 'S' -->
  <g filter="url(#lA-shadow)">
    <circle cx="40" cy="40" r="18" fill="url(#lA-disc)"/>
    <circle cx="40" cy="40" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-opacity="0.85"/>
  </g>
  <path d="M48 32 Q32 32 32 38 Q32 42 38 43 L42 44 Q48 45 48 48 Q48 52 36 52"
        stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Tiny gold sparkle, top-right -->
  <g fill="#FCD34D" transform="translate(56 26)">
    <circle cx="0" cy="0" r="2.4"/>
    <path d="M0 -6 v3 M0 4 v3 M-6 0 h3 M4 0 h3" stroke="#FCD34D" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Arabic 'إن شاء الله' above the 'ia' — visualises the wordplay -->
  <text x="190" y="22" text-anchor="middle" font-size="11" font-weight="600"
        fill="#F59E0B" opacity="0.95"
        font-family="'Geeza Pro','Damascus','Arabic UI Display','Noto Naskh Arabic',sans-serif"
        direction="rtl">إن شاء الله</text>

  <!-- Wordmark: Serv (teal) + ia (gold) with kashida-style curl -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="800" letter-spacing="-0.5">
    <text x="92" y="58" font-size="38" fill="#0F766E">Serv</text>
    <text x="172" y="58" font-size="38" fill="#F59E0B">ia</text>
    <path d="M172 68 Q200 75 222 68 Q226 66 224 62" stroke="#F59E0B" stroke-width="2.6"
          stroke-linecap="round" fill="none"/>
    <text x="92" y="84" font-size="10" font-weight="600" letter-spacing="2.6"
          fill="#475569">YOUR UAE FIX-IT IN 60 SECONDS</text>
  </g>
</svg>
