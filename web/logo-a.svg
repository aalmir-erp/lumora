<?xml version="1.0" encoding="UTF-8"?>
<!-- Variant A — Minimal: 'ia' in gold + small underline curl evoking Arabic kashida.
     Subtle, brief, scales to favicon size cleanly. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" role="img" aria-label="Servia logo">
  <defs>
    <linearGradient id="lA-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F766E"/>
      <stop offset="55%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="lA-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Mark -->
  <g>
    <rect x="8" y="8" width="64" height="64" rx="18" fill="url(#lA-grad)"/>
    <rect x="12" y="12" width="56" height="20" rx="14" fill="#fff" opacity="0.10"/>
    <circle cx="40" cy="42" r="22" fill="url(#lA-glow)"/>
    <path d="M52 24 Q28 24 28 36 Q28 44 38 46 L48 48 Q56 50 56 56 Q56 64 38 64"
          stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <g transform="translate(56 22)">
      <path d="M0 -8 L1.6 -1.6 L8 0 L1.6 1.6 L0 8 L-1.6 1.6 L-8 0 L-1.6 -1.6 Z" fill="#FCD34D"/>
    </g>
  </g>
  <!-- Wordmark: Serv (teal) + ia (gold) with kashida-style curl underneath 'ia' -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="800" letter-spacing="-0.5">
    <text x="92" y="50" font-size="38" fill="#0F766E">Serv</text>
    <text x="172" y="50" font-size="38" fill="#F59E0B">ia</text>
    <!-- kashida curl: long horizontal stroke with subtle upward hook on the right
         (mimics Arabic calligrapher's elongation under the last letters) -->
    <path d="M172 60 Q200 67 222 60 Q226 58 224 54" stroke="#F59E0B" stroke-width="2.6"
          stroke-linecap="round" fill="none"/>
    <text x="92" y="74" font-size="10" font-weight="600" letter-spacing="2.6"
          fill="#475569">YOUR UAE FIX-IT IN 60 SECONDS</text>
  </g>
</svg>
