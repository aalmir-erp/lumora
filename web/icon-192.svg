  </g>
  <text x="96" y="112" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif"
        font-size="56" font-weight="900" fill="#FFFFFF"
        letter-spacing="-1.5">S</text>
  <g fill="#FCD34D">
    <circle cx="130" cy="66" r="3.5"/>
    <path d="M130 58 v5 M130 69 v5 M122 66 h5 M133 66 h5"
