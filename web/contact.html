<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="servia-page" content="default">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0D9488">
<title>Contact Servia — UAE home services support</title>
<meta name="description" content="Reach Servia for any UAE home or business service inquiry. Send a message and we will get back within minutes.">
<link rel="canonical" href="https://servia.ae/contact.html">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon-192.svg">
<link rel="preload" as="style" href="/style.css" onload="this.rel='stylesheet';this.onload=null"><noscript><link rel="stylesheet" href="/style.css"></noscript>
<link rel="preload" as="style" href="/widget.css" onload="this.rel='stylesheet';this.onload=null"><noscript><link rel="stylesheet" href="/widget.css"></noscript>
<style>
  body { background:linear-gradient(180deg,#FFFBEB,#F8FAFC); }
  .wrap { max-width:560px; margin:48px auto 80px; padding:0 16px }
  .card { background:#fff; border:1px solid var(--border); border-radius:18px;
    padding:28px; box-shadow:0 8px 24px rgba(15,23,42,.06) }
  .field { margin:12px 0 }
  .field label { display:block; font-size:12.5px; color:var(--muted); font-weight:700;
    margin-bottom:5px; text-transform:uppercase; letter-spacing:.06em }
  .field input, .field textarea, .field select {
    width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:12px;
    font-size:15px; font-family:inherit; min-height:46px }
  .field textarea { min-height:120px; resize:vertical }
</style>
<script src="/banner.js" defer></script>
<script src="/_snippets.js" async></script>
<script src="/cart-badge.js" async></script>
<script src="/social-strip.js" async></script>
</head><body>
<div class="uae-flag-strip" aria-hidden="true" style="height:5px;background:linear-gradient(90deg,#00732F 0% 25%,#fff 25% 50%,#000 50% 75%,#FF0000 75% 100%)"></div>
<nav class="nav"><div class="nav-inner">
  <a href="/"><img src="/logo.svg" height="36" alt="Servia" decoding="async"></a>
  <div class="nav-cta" style="margin-inline-start:auto"><a class="btn btn-primary" href="/book.html">Book now</a></div>
</div></nav>

<section class="wrap">
  <h1 style="font-size:30px;letter-spacing:-.02em;margin:0 0 6px">Contact Servia</h1>
  <p style="color:var(--muted);margin:0 0 24px">Send a message and we'll respond on email or via the bot here.</p>

  <div class="card">
    <form id="contact-form" onsubmit="return submitContact(event)">
      <div class="field"><label>Your name</label><input name="name" required></div>
      <div class="field"><label>Email</label><input type="email" name="email" required></div>
      <div class="field"><label>Topic</label>
        <select name="topic">
          <option>General question</option>
          <option>Booking issue</option>
          <option>Vendor / partner</option>
          <option>Refund or billing</option>
          <option>Press / media</option>
          <option>Urgent</option>
        </select></div>
      <div class="field"><label>Your message</label><textarea name="message" required></textarea></div>
      <button class="btn btn-primary btn-block" type="submit">Send message →</button>
    </form>
    <div id="contact-ok" style="display:none;background:#ECFDF5;border:1px solid #6EE7B7;border-radius:12px;padding:14px;margin-top:14px;color:#065F46;font-weight:600">
      ✅ Message sent. We'll get back to you within minutes.
    </div>
  </div>

  <p style="text-align:center;margin-top:24px;color:var(--muted);font-size:13px">
    Or email us: <a href="mailto:hello@servia.ae" style="color:#0F766E">hello@servia.ae</a>
  </p>
</section>

<footer><div class="container">
  <div><img src="/logo.svg" height="36" alt="Servia" style="filter:brightness(0) invert(1)" decoding="async"></div>
  <div><h3>Customers</h3><a href="/services.html">All services</a><br><a href="/book.html">Book online</a><br><a href="/me.html">My account</a></div>
  <div><h3>Legal</h3><a href="/terms.html">Terms</a><br><a href="/privacy.html">Privacy</a><br><a href="/refund.html">Refund</a></div>
  <div><h3>Contact</h3><a href="/contact.html">Contact us</a><br><a href="mailto:hello@servia.ae">hello@servia.ae</a></div>
</div></footer>

<script>
async function submitContact(e) {
  e.preventDefault();
  const f = e.target;
  const data = {
    name: f.name.value, email: f.email.value,
    topic: f.topic.value, message: f.message.value,
  };
  try {
    const r = await fetch("/api/contact", {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify(data),
    });
    if (r.ok) {
      f.style.display = "none";
      document.getElementById("contact-ok").style.display = "block";
    } else {
      alert("Could not send — please try email instead.");
    }
  } catch (err) { alert("Network error — " + err.message); }
  return false;
}
</script>

<script src="/theme.js" defer></script>
<script src="/app.js" defer></script>
<script src="/install.js" defer></script>
<script>(function(){let l=false;function ld(){if(l)return;l=true;const s=document.createElement("script");s.src="/widget.js";s.async=true;document.body.appendChild(s);}if("requestIdleCallback" in window)requestIdleCallback(ld,{timeout:4000});else setTimeout(ld,3000);["pointerdown","touchstart","scroll","keydown"].forEach(ev=>addEventListener(ev,ld,{once:true,passive:true}));})();</script>
</body></html>
