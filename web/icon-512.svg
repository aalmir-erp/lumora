<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rounded"><rect width="512" height="512" rx="112"/></clipPath>
    <radialGradient id="face" cx="0.45" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FCD34D"/>
    </radialGradient>
    <radialGradient id="badge" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#14B8A6"/><stop offset="60%" stop-color="#0D9488"/><stop offset="100%" stop-color="#0F766E"/>
    </radialGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.30"/>
    </filter>
  </defs>
  <!-- UAE flag background -->
  <g clip-path="url(#rounded)">
    <rect x="0" y="0" width="128" height="512" fill="#EF3340"/>
    <rect x="128" y="0" width="384" height="170.67" fill="#00732F"/>
    <rect x="128" y="170.67" width="384" height="170.66" fill="#FFFFFF"/>
    <rect x="128" y="341.33" width="384" height="170.67" fill="#000000"/>
  </g>

  <!-- Centered teal disc (badge / mascot frame) -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="128" fill="url(#badge)"/>
    <circle cx="256" cy="256" r="128" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.85"/>
  </g>

  <!-- Mascot face inside the disc -->
  <g transform="translate(256,256)">
    <!-- Face -->
    <circle cx="0" cy="14" r="78" fill="url(#face)"/>
    <!-- Cheeks -->
    <ellipse cx="-38" cy="32" rx="14" ry="9" fill="#FB7185" opacity="0.45"/>
    <ellipse cx="38"  cy="32" rx="14" ry="9" fill="#FB7185" opacity="0.45"/>
    <!-- Eyes -->
    <circle cx="-22" cy="6" r="7.5" fill="#0F172A"/>
    <circle cx="22"  cy="6" r="7.5" fill="#0F172A"/>
    <circle cx="-19" cy="3" r="2.6" fill="#FFFFFF"/>
    <circle cx="25"  cy="3" r="2.6" fill="#FFFFFF"/>
    <!-- Smile -->
    <path d="M -22 36 Q 0 56 22 36" stroke="#0F172A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Cap -->
    <path d="M -64 -22 Q -54 -68 0 -68 Q 54 -68 64 -22 L 56 -8 Q 0 -22 -56 -8 Z" fill="url(#cap)"/>
    <rect x="-66" y="-12" width="132" height="6" rx="3" fill="#0D9488"/>
    <!-- Cap badge with tiny S -->
    <circle cx="0" cy="-44" r="14" fill="#0D9488"/>
    <text x="0" y="-39" text-anchor="middle"
          font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif"
          font-size="20" font-weight="900" fill="#FFFFFF">S</text>
  </g>

  <!-- Gold sparkle accent -->
  <g fill="#FCD34D">
    <circle cx="380" cy="142" r="9"/>
    <path d="M380 122 v14 M380 148 v14 M360 142 h14 M386 142 h14"
          stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
