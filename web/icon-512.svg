<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- UAE flag background: red vertical (25%) + green/white/black horizontals -->
  <defs>
    <clipPath id="rounded"><rect width="512" height="512" rx="112"/></clipPath>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.30"/>
    </filter>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Red vertical hoist (left 25%) -->
    <rect x="0" y="0" width="128" height="512" fill="#EF3340"/>
    <!-- Green top stripe -->
    <rect x="128" y="0" width="384" height="170.67" fill="#00732F"/>
    <!-- White middle stripe -->
    <rect x="128" y="170.67" width="384" height="170.66" fill="#FFFFFF"/>
    <!-- Black bottom stripe -->
    <rect x="128" y="341.33" width="384" height="170.67" fill="#000000"/>
  </g>
  <!-- Center Servia badge (in the maskable safe zone, ~256x256 centered) -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="118" fill="url(#badge)"/>
    <circle cx="256" cy="256" r="118" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.85"/>
  </g>
  <!-- Servia "S" mark in white -->
  <text x="256" y="298" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif"
        font-size="148" font-weight="900" fill="#FFFFFF"
        letter-spacing="-4">S</text>
  <!-- Tiny gold sparkle (UAE-themed accent, top-right of S) -->
  <g fill="#FCD34D">
    <circle cx="346" cy="178" r="9"/>
    <path d="M346 158 v14 M346 184 v14 M326 178 h14 M352 178 h14"
          stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
