    <text x="92" y="50" font-size="38" fill="#0F172A">Serv</text>
    <text x="172" y="50" font-size="38" fill="url(#lm-grad)">ia</text>
    <path d="M92 60 Q160 70 230 56" stroke="url(#lm-grad)" stroke-width="2.5"
